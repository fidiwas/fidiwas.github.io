<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.58" stop-color="#13213a"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="0" y="548" width="1200" height="127" fill="#06111f" opacity="0.78"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="72" y="72" font-size="22" font-weight="700" fill="#5eead4">The Signal / Сигнал</text>
    <text x="72" y="174" font-size="56" font-weight="850" fill="#ffffff">ИИ пустят</text>
    <text x="72" y="242" font-size="56" font-weight="850" fill="#ffffff">к вашей карте</text>
    <text x="74" y="330" font-size="39" font-weight="850" fill="#fef3c7">Кто ответит</text>
    <text x="74" y="382" font-size="39" font-weight="850" fill="#fef3c7">за покупку?</text>
    <text x="76" y="466" font-size="27" fill="#dbeafe">AI-агенты уже учатся выбирать,</text>
    <text x="76" y="506" font-size="27" fill="#dbeafe">платить и спорить с магазином.</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" filter="url(#shadow)">
    <rect x="742" y="92" width="386" height="444" rx="26" fill="url(#card)"/>
    <text x="935" y="152" text-anchor="middle" font-size="24" font-weight="850" fill="#0f172a">AI checkout</text>
    <rect x="802" y="204" width="266" height="62" rx="16" fill="#f8fafc"/>
    <text x="830" y="242" font-size="20" font-weight="800" fill="#334155">товар найден</text>
    <text x="1040" y="242" text-anchor="end" font-size="20" font-weight="850" fill="#0f766e">OK</text>
    <rect x="802" y="294" width="266" height="62" rx="16" fill="#fff7ed"/>
    <text x="830" y="332" font-size="20" font-weight="800" fill="#9a3412">лимит</text>
    <text x="1040" y="332" text-anchor="end" font-size="22" font-weight="850" fill="#991b1b">5000 ₽</text>
    <rect x="820" y="402" width="232" height="54" rx="27" fill="#0f766e"/>
    <text x="936" y="436" text-anchor="middle" font-size="20" font-weight="850" fill="#ffffff">подтвердить</text>
  </g>
  <g stroke="#5eead4" stroke-width="3" opacity="0.72">
    <line x1="682" y1="234" x2="758" y2="234"/>
    <line x1="682" y1="326" x2="758" y2="326"/>
    <line x1="682" y1="430" x2="758" y2="430"/>
  </g>
  <text x="600" y="626" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="850" fill="#ffffff">Новый посредник между вами, магазином и банком</text>
</svg>
