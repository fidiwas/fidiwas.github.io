<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="72" y="70" font-size="22" font-weight="700" fill="#0f766e">The Signal / Сигнал</text>
    <text x="600" y="122" text-anchor="middle" font-size="42" font-weight="850" fill="#0f172a">Как покупает AI-агент</text>
    <text x="600" y="162" text-anchor="middle" font-size="22" fill="#475569">Опасность не в одной кнопке, а в длинной цепочке решений</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="62" y="236" width="154" height="118" rx="18" fill="#ffffff"/>
    <text x="139" y="280" text-anchor="middle" font-size="22" font-weight="850" fill="#0f172a">запрос</text>
    <text x="139" y="314" text-anchor="middle" font-size="15" fill="#64748b">что купить</text>
    <rect x="262" y="236" width="154" height="118" rx="18" fill="#ecfeff"/>
    <text x="339" y="280" text-anchor="middle" font-size="22" font-weight="850" fill="#155e75">выбор</text>
    <text x="339" y="314" text-anchor="middle" font-size="15" fill="#64748b">товар и цена</text>
    <rect x="462" y="236" width="154" height="118" rx="18" fill="#fef3c7"/>
    <text x="539" y="280" text-anchor="middle" font-size="22" font-weight="850" fill="#92400e">лимит</text>
    <text x="539" y="314" text-anchor="middle" font-size="15" fill="#64748b">правила оплаты</text>
    <rect x="662" y="236" width="154" height="118" rx="18" fill="#dcfce7"/>
    <text x="739" y="280" text-anchor="middle" font-size="22" font-weight="850" fill="#166534">платеж</text>
    <text x="739" y="314" text-anchor="middle" font-size="15" fill="#64748b">карта или токен</text>
    <rect x="862" y="236" width="154" height="118" rx="18" fill="#ede9fe"/>
    <text x="939" y="280" text-anchor="middle" font-size="22" font-weight="850" fill="#5b21b6">заказ</text>
    <text x="939" y="314" text-anchor="middle" font-size="15" fill="#64748b">доставка</text>
    <rect x="1062" y="236" width="106" height="118" rx="18" fill="#fff7ed"/>
    <text x="1115" y="280" text-anchor="middle" font-size="21" font-weight="850" fill="#9a3412">спор</text>
    <text x="1115" y="314" text-anchor="middle" font-size="15" fill="#64748b">если сбой</text>
  </g>
  <g stroke="#0f766e" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M224 295 H254"/>
    <path d="M424 295 H454"/>
    <path d="M624 295 H654"/>
    <path d="M824 295 H854"/>
    <path d="M1024 295 H1054"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="205" y="438" width="790" height="86" rx="22" fill="#0f172a"/>
    <text x="600" y="474" text-anchor="middle" font-size="24" font-weight="850" fill="#ffffff">слабое место - между намерением и оплатой</text>
    <text x="600" y="507" text-anchor="middle" font-size="19" fill="#cbd5e1">если агент понял запрос не так, спор начинается уже после покупки</text>
  </g>
