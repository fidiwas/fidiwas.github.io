<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020617" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="#101827"/>
  <text x="70" y="78" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="850" fill="#ffffff">До и после 1 октября</text>
  <text x="72" y="118" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#cbd5e1">Покупатель не увидит революцию за один день.</text>
  <text x="72" y="148" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#cbd5e1">Но внутренняя кухня маркетплейсов станет формальнее.</text>

  <g filter="url(#shadow)" font-family="Arial, Helvetica, sans-serif">
    <rect x="75" y="215" width="500" height="330" rx="34" fill="#f8fafc"/>
    <text x="325" y="270" text-anchor="middle" font-size="32" font-weight="850" fill="#0f172a">Сейчас</text>
    <text x="140" y="330" font-size="22" fill="#334155">• правила разбросаны по офертам</text>
    <text x="140" y="378" font-size="22" fill="#334155">• скидки часто выглядят как акция</text>
    <text x="140" y="426" font-size="22" fill="#334155">• блокировки и изменения спорят</text>
    <text x="140" y="474" font-size="22" fill="#334155">• покупатель видит итог, но не кухню</text>

    <rect x="625" y="215" width="500" height="330" rx="34" fill="#ecfeff"/>
    <text x="875" y="270" text-anchor="middle" font-size="32" font-weight="850" fill="#0f172a">После запуска закона</text>
    <text x="690" y="330" font-size="22" fill="#0e7490">• договоры и редакции фиксируются</text>
    <text x="690" y="378" font-size="22" fill="#0e7490">• скидки требуют понятных правил</text>
    <text x="690" y="426" font-size="22" fill="#0e7490">• карточки и документы проверяются</text>
    <text x="690" y="474" font-size="22" fill="#0e7490">• ПВЗ получают формальные рамки</text>
  </g>

  <rect x="150" y="586" width="900" height="52" rx="18" fill="#22c55e"/>
  <text x="600" y="620" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="850" fill="#052e16">Это не обещание низких цен. Это попытка сделать правила видимыми.</text>
</svg>
