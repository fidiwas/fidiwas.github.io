<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020617" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <text x="70" y="76" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="850" fill="#0f172a">Кого заденут новые правила</text>
  <text x="72" y="116" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#475569">Закон касается не только витрины маркетплейса.</text>
  <text x="72" y="148" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#475569">Он описывает отношения всех участников платформы.</text>

  <g filter="url(#shadow)" font-family="Arial, Helvetica, sans-serif">
    <rect x="80" y="244" width="240" height="150" rx="28" fill="#ffffff"/>
    <text x="200" y="296" text-anchor="middle" font-size="26" font-weight="850" fill="#0f172a">Покупатель</text>
    <text x="200" y="332" text-anchor="middle" font-size="18" fill="#64748b">видит товар, цену,</text>
    <text x="200" y="360" text-anchor="middle" font-size="18" fill="#64748b">продавца и правила</text>

    <rect x="360" y="190" width="250" height="150" rx="28" fill="#ecfeff"/>
    <text x="485" y="242" text-anchor="middle" font-size="26" font-weight="850" fill="#0f172a">Платформа</text>
    <text x="485" y="278" text-anchor="middle" font-size="18" fill="#0e7490">задает договоры,</text>
    <text x="485" y="306" text-anchor="middle" font-size="18" fill="#0e7490">выдачу и блокировки</text>

    <rect x="360" y="390" width="250" height="150" rx="28" fill="#dcfce7"/>
    <text x="485" y="442" text-anchor="middle" font-size="26" font-weight="850" fill="#064e3b">Продавец</text>
    <text x="485" y="478" text-anchor="middle" font-size="18" fill="#166534">отвечает за карточки,</text>
    <text x="485" y="506" text-anchor="middle" font-size="18" fill="#166534">документы и цены</text>

    <rect x="650" y="244" width="250" height="150" rx="28" fill="#fff7ed"/>
    <text x="775" y="296" text-anchor="middle" font-size="26" font-weight="850" fill="#7c2d12">ПВЗ</text>
    <text x="775" y="332" text-anchor="middle" font-size="18" fill="#9a3412">работает по правилам</text>
    <text x="775" y="360" text-anchor="middle" font-size="18" fill="#9a3412">и распределению рисков</text>

    <rect x="940" y="244" width="190" height="150" rx="28" fill="#e2e8f0"/>
    <text x="1035" y="296" text-anchor="middle" font-size="26" font-weight="850" fill="#0f172a">Закон</text>
    <text x="1035" y="332" text-anchor="middle" font-size="18" fill="#475569">делает связи</text>
    <text x="1035" y="360" text-anchor="middle" font-size="18" fill="#475569">формальными</text>
  </g>

  <path d="M320 319H360" stroke="#0f766e" stroke-width="6" stroke-linecap="round"/>
  <path d="M610 265C634 275 640 298 650 319" stroke="#0f766e" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M610 465C634 444 640 342 650 319" stroke="#0f766e" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M900 319H940" stroke="#0f766e" stroke-width="6" stroke-linecap="round"/>

  <rect x="160" y="582" width="880" height="54" rx="18" fill="#0f172a"/>
  <text x="600" y="617" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="#ffffff">Главное: платформа становится регулируемой средой.</text>
</svg>
