<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="58%" stop-color="#1b2a3a"/>
      <stop offset="100%" stop-color="#122f2d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1040" cy="105" r="210" fill="#38bdf8" opacity="0.08"/>
  <circle cx="150" cy="590" r="260" fill="#22c55e" opacity="0.08"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="78" y="82" font-size="22" font-weight="700" fill="#7dd3fc">The Signal / Сигнал</text>
    <text x="78" y="210" font-size="68" font-weight="850" fill="#ffffff">Маркетплейсы</text>
    <text x="78" y="286" font-size="68" font-weight="850" fill="#ffffff">по новым</text>
    <text x="78" y="362" font-size="68" font-weight="850" fill="#ffffff">правилам</text>
    <rect x="80" y="397" width="122" height="8" rx="4" fill="#22c55e"/>
    <text x="78" y="462" font-size="30" fill="#cbd5e1">Что изменится</text>
    <text x="78" y="503" font-size="30" fill="#cbd5e1">с 1 октября 2026</text>
    <text x="78" y="552" font-size="27" font-weight="800" fill="#5eead4">для покупателей, продавцов и ПВЗ</text>
  </g>

  <g filter="url(#shadow)" font-family="Arial, Helvetica, sans-serif">
    <rect x="674" y="78" width="410" height="520" rx="42" fill="#f8fafc"/>
    <rect x="716" y="120" width="326" height="58" rx="22" fill="#e2e8f0"/>
    <text x="879" y="158" text-anchor="middle" font-size="24" font-weight="850" fill="#0f172a">1 октября 2026</text>

    <rect x="724" y="216" width="310" height="76" rx="24" fill="#ffffff" stroke="#dbe4ee" stroke-width="2"/>
    <text x="879" y="247" text-anchor="middle" dominant-baseline="middle" font-size="23" font-weight="850" fill="#0f172a">Договоры</text>
    <text x="879" y="276" text-anchor="middle" dominant-baseline="middle" font-size="17" fill="#64748b">правила и редакции</text>

    <rect x="724" y="322" width="310" height="76" rx="24" fill="#ecfeff" stroke="#bae6fd" stroke-width="2"/>
    <text x="879" y="353" text-anchor="middle" dominant-baseline="middle" font-size="23" font-weight="850" fill="#0f172a">Карточки</text>
    <text x="879" y="382" text-anchor="middle" dominant-baseline="middle" font-size="17" fill="#0e7490">документы и товары</text>

    <rect x="724" y="428" width="310" height="76" rx="24" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
    <text x="879" y="459" text-anchor="middle" dominant-baseline="middle" font-size="23" font-weight="850" fill="#064e3b">Скидки</text>
    <text x="879" y="488" text-anchor="middle" dominant-baseline="middle" font-size="17" fill="#166534">больше формальных правил</text>

    <text x="879" y="548" text-anchor="middle" font-size="20" font-weight="800" fill="#0369a1">Платформа становится</text>
    <text x="879" y="576" text-anchor="middle" font-size="20" font-weight="800" fill="#0369a1">регулируемой инфраструктурой</text>
  </g>
</svg>
