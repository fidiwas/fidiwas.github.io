<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#10233c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12243c"/>
      <stop offset="1" stop-color="#0b1829"/>
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>
  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1020" cy="120" r="150" fill="#0ea5e9" opacity="0.15" filter="url(#soft)"/>
  <circle cx="170" cy="595" r="170" fill="#22c55e" opacity="0.12" filter="url(#soft)"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="76" font-size="22" font-weight="800" fill="#7dd3fc">The Signal / Сигнал</text>
    <text x="70" y="150" font-size="54" font-weight="900" fill="#ffffff">Где начинается ловушка</text>
    <text x="72" y="200" font-size="25" fill="#cbd5e1">Подписка честна, пока цена, срок и выход понятны</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="82" y="292" width="168" height="112" rx="24" fill="url(#card)" stroke="#38bdf8" stroke-opacity="0.65"/>
    <text x="166" y="337" text-anchor="middle" font-size="22" font-weight="900" fill="#e0f2fe">пробный</text>
    <text x="166" y="371" text-anchor="middle" font-size="18" fill="#93c5fd">период</text>
    <rect x="292" y="292" width="168" height="112" rx="24" fill="url(#card)" stroke="#2dd4bf" stroke-opacity="0.65"/>
    <text x="376" y="337" text-anchor="middle" font-size="22" font-weight="900" fill="#ccfbf1">цена</text>
    <text x="376" y="371" text-anchor="middle" font-size="18" fill="#99f6e4">после старта</text>
    <rect x="502" y="292" width="168" height="112" rx="24" fill="url(#card)" stroke="#facc15" stroke-opacity="0.65"/>
    <text x="586" y="337" text-anchor="middle" font-size="22" font-weight="900" fill="#fef3c7">напоминание</text>
    <text x="586" y="371" text-anchor="middle" font-size="18" fill="#fde68a">до списания</text>
    <rect x="712" y="292" width="168" height="112" rx="24" fill="url(#card)" stroke="#fb7185" stroke-opacity="0.65"/>
    <text x="796" y="337" text-anchor="middle" font-size="22" font-weight="900" fill="#ffe4e6">списание</text>
    <text x="796" y="371" text-anchor="middle" font-size="18" fill="#fecdd3">с карты</text>
    <rect x="922" y="276" width="198" height="144" rx="28" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
    <text x="1021" y="337" text-anchor="middle" font-size="30" font-weight="900" fill="#9a3412">отмена</text>
    <text x="1021" y="378" text-anchor="middle" font-size="20" font-weight="800" fill="#7c2d12">без квеста</text>
  </g>
  <g stroke="#7dd3fc" stroke-width="4" stroke-linecap="round" opacity="0.85">
    <path d="M253 348 H286"/>
    <path d="M463 348 H496"/>
    <path d="M673 348 H706"/>
    <path d="M883 348 H916"/>
  </g>
  <rect x="220" y="510" width="760" height="76" rx="26" fill="#06101f" stroke="#2dd4bf" stroke-opacity="0.65"/>
  <text x="600" y="557" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="900" fill="#ffffff">Если выход спрятан, подписка становится ловушкой</text>
</svg>
