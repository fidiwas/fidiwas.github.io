<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#083344"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)"/>
  <circle cx="990" cy="120" r="150" fill="#0ea5e9" opacity="0.16" filter="url(#soft)"/>
  <circle cx="210" cy="570" r="170" fill="#14b8a6" opacity="0.12" filter="url(#soft)"/>
  <g opacity="0.2" stroke="#7dd3fc" stroke-width="1">
    <path d="M70 548 C260 455 450 490 650 385 C820 295 960 300 1130 228" fill="none"/>
    <path d="M95 600 C300 500 500 522 705 425 C890 340 1010 350 1130 305" fill="none"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="72" y="70" font-size="23" font-weight="800" fill="#7dd3fc">The Signal / Сигнал</text>
    <text x="72" y="163" font-size="68" font-weight="900" fill="#ffffff">Списали</text>
    <text x="72" y="242" font-size="68" font-weight="900" fill="#ffffff">за подписку?</text>
    <text x="74" y="322" font-size="42" font-weight="900" fill="#fde68a">Не всегда</text>
    <text x="74" y="376" font-size="42" font-weight="900" fill="#fde68a">«сам виноват»</text>
    <text x="76" y="488" font-size="28" fill="#cbd5e1">Автопродление было удобством.</text>
    <text x="76" y="528" font-size="28" fill="#cbd5e1">Теперь это вопрос честного согласия.</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="744" y="106" width="382" height="438" rx="30" fill="url(#card)" stroke="#bae6fd" stroke-width="2"/>
    <text x="935" y="166" text-anchor="middle" font-size="28" font-weight="900" fill="#0f172a">Уведомления банка</text>
    <rect x="788" y="208" width="294" height="68" rx="18" fill="#ecfeff"/>
    <text x="830" y="244" font-size="21" font-weight="850" fill="#0e7490">Digital service</text>
    <text x="1048" y="244" text-anchor="end" font-size="24" font-weight="900" fill="#991b1b">-399 ₽</text>
    <text x="830" y="262" font-size="16" font-weight="700" fill="#64748b">пробный период закончился</text>
    <rect x="788" y="316" width="294" height="68" rx="18" fill="#fff7ed"/>
    <text x="830" y="352" font-size="21" font-weight="850" fill="#9a3412">Cloud plan</text>
    <text x="1048" y="352" text-anchor="end" font-size="24" font-weight="900" fill="#991b1b">-799 ₽</text>
    <text x="830" y="370" font-size="16" font-weight="700" fill="#64748b">вы давно не заходили</text>
    <rect x="788" y="424" width="294" height="68" rx="18" fill="#f0fdf4"/>
    <text x="830" y="460" font-size="21" font-weight="850" fill="#166534">Pro access</text>
    <text x="1048" y="460" text-anchor="end" font-size="24" font-weight="900" fill="#991b1b">-1490 ₽</text>
    <text x="830" y="478" font-size="16" font-weight="700" fill="#64748b">кнопку отмены не нашли</text>
  </g>
  <rect x="72" y="590" width="694" height="56" rx="20" fill="url(#green)" opacity="0.96"/>
  <text x="419" y="626" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="900" fill="#04121f">Проверьте регулярные списания сегодня</text>
