<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.5" stop-color="#162554"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="74" y="76" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#7dd3fc">The Signal / Сигнал</text>
  <text x="600" y="136" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="850" fill="#ffffff">У интернета появилась вторая аудитория</text>
  <text x="600" y="176" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#cbd5e1">Машины ходят по сайтам не так, как человек.</text>

  <g filter="url(#shadow)" font-family="Arial, Helvetica, sans-serif">
    <rect x="86" y="248" width="300" height="280" rx="32" fill="#f8fafc"/>
    <circle cx="236" cy="316" r="42" fill="#dbeafe"/>
    <text x="236" y="328" text-anchor="middle" font-size="32" font-weight="850" fill="#1d4ed8">1</text>
    <text x="236" y="394" text-anchor="middle" font-size="30" font-weight="850" fill="#111827">Сканеры</text>
    <text x="236" y="438" text-anchor="middle" font-size="21" font-weight="700" fill="#475569">читают веб</text>
    <text x="236" y="468" text-anchor="middle" font-size="21" font-weight="700" fill="#475569">для индекса</text>
    <text x="236" y="498" text-anchor="middle" font-size="21" font-weight="700" fill="#475569">и обучения</text>

    <rect x="450" y="248" width="300" height="280" rx="32" fill="#ecfeff"/>
    <circle cx="600" cy="316" r="42" fill="#a5f3fc"/>
    <text x="600" y="328" text-anchor="middle" font-size="32" font-weight="850" fill="#0e7490">2</text>
    <text x="600" y="394" text-anchor="middle" font-size="30" font-weight="850" fill="#111827">Сборщики</text>
    <text x="600" y="438" text-anchor="middle" font-size="21" font-weight="700" fill="#475569">берут свежие</text>
    <text x="600" y="468" text-anchor="middle" font-size="21" font-weight="700" fill="#475569">цены, факты,</text>
    <text x="600" y="498" text-anchor="middle" font-size="21" font-weight="700" fill="#475569">наличие</text>

    <rect x="814" y="248" width="300" height="280" rx="32" fill="#f0fdf4"/>
    <circle cx="964" cy="316" r="42" fill="#bbf7d0"/>
    <text x="964" y="328" text-anchor="middle" font-size="32" font-weight="850" fill="#166534">3</text>
    <text x="964" y="394" text-anchor="middle" font-size="30" font-weight="850" fill="#111827">Агенты</text>
    <text x="964" y="438" text-anchor="middle" font-size="21" font-weight="700" fill="#475569">сравнивают</text>
    <text x="964" y="468" text-anchor="middle" font-size="21" font-weight="700" fill="#475569">и действуют</text>
    <text x="964" y="498" text-anchor="middle" font-size="21" font-weight="700" fill="#475569">по поручению</text>
  </g>

  <rect x="124" y="574" width="952" height="52" rx="18" fill="#020617" opacity="0.78"/>
  <text x="600" y="608" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="850" fill="#ffffff">Клиент остается человеком. Но первый маршрут все чаще проходит машина.</text>
</svg>
