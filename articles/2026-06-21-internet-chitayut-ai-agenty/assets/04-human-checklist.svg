<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="0.55" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="76" y="76" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#0e7490">The Signal / Сигнал</text>
  <text x="600" y="136" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="850" fill="#111827">Как проверять AI-ответ</text>
  <text x="600" y="176" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#475569">Если решение важное, не отдавайте его посреднику вслепую.</text>

  <g filter="url(#shadow)" font-family="Arial, Helvetica, sans-serif">
    <rect x="86" y="248" width="244" height="224" rx="28" fill="#ffffff"/>
    <circle cx="208" cy="302" r="30" fill="#ccfbf1"/>
    <text x="208" y="312" text-anchor="middle" font-size="28" font-weight="850" fill="#0f766e">1</text>
    <text x="208" y="362" text-anchor="middle" font-size="28" font-weight="850" fill="#111827">Источник</text>
    <text x="208" y="408" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">есть ссылка</text>
    <text x="208" y="438" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">на первоисточник?</text>

    <rect x="358" y="248" width="244" height="224" rx="28" fill="#eff6ff"/>
    <circle cx="480" cy="302" r="30" fill="#bfdbfe"/>
    <text x="480" y="312" text-anchor="middle" font-size="28" font-weight="850" fill="#1d4ed8">2</text>
    <text x="480" y="362" text-anchor="middle" font-size="28" font-weight="850" fill="#111827">Дата</text>
    <text x="480" y="408" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">ответ свежий</text>
    <text x="480" y="438" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">или старый?</text>

    <rect x="630" y="248" width="244" height="224" rx="28" fill="#fff7ed"/>
    <circle cx="752" cy="302" r="30" fill="#fed7aa"/>
    <text x="752" y="312" text-anchor="middle" font-size="28" font-weight="850" fill="#9a3412">3</text>
    <text x="752" y="362" text-anchor="middle" font-size="28" font-weight="850" fill="#111827">Действие</text>
    <text x="752" y="408" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">AI только ищет</text>
    <text x="752" y="438" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">или уже кликает?</text>

    <rect x="902" y="248" width="244" height="224" rx="28" fill="#f0fdf4"/>
    <circle cx="1024" cy="302" r="30" fill="#bbf7d0"/>
    <text x="1024" y="312" text-anchor="middle" font-size="28" font-weight="850" fill="#166534">4</text>
    <text x="1024" y="362" text-anchor="middle" font-size="28" font-weight="850" fill="#111827">Ответ</text>
    <text x="1024" y="408" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">кто отвечает</text>
    <text x="1024" y="438" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">за ошибку?</text>
  </g>

  <rect x="192" y="544" width="816" height="58" rx="20" fill="#111827"/>
  <text x="600" y="581" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="850" fill="#ffffff">Чем умнее посредник, тем важнее видеть его источники.</text>
</svg>
