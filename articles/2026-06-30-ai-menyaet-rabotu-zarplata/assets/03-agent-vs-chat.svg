<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#10223d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="58" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#45ffd2">The Signal / Сигнал</text>
  <text x="600" y="112" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="900" fill="#ffffff">Чат-бот или агент?</text>
  <text x="600" y="154" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="600" fill="#9fb2cb">Разница не в названии, а в длине действия</text>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="96" y="230" width="430" height="300" rx="34" fill="#ffffff"/>
    <text x="311" y="292" text-anchor="middle" font-size="34" font-weight="900" fill="#0f172a">Чат-бот</text>
    <rect x="166" y="350" width="290" height="76" rx="24" fill="#eaf2ff"/>
    <text x="311" y="396" text-anchor="middle" font-size="26" font-weight="900" fill="#2453b3">дает ответ</text>
    <text x="311" y="477" text-anchor="middle" font-size="22" font-weight="700" fill="#65758b">человек сам собирает</text>
  </g>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="674" y="230" width="430" height="300" rx="34" fill="#dffff6"/>
    <text x="889" y="292" text-anchor="middle" font-size="34" font-weight="900" fill="#0f172a">AI-агент</text>
    <rect x="744" y="350" width="290" height="76" rx="24" fill="#0e8f7f"/>
    <text x="889" y="396" text-anchor="middle" font-size="26" font-weight="900" fill="#ffffff">делает цепочку</text>
    <text x="889" y="477" text-anchor="middle" font-size="22" font-weight="700" fill="#1f4e49">человек проверяет итог</text>
  </g>

  <path d="M555 380 H645" stroke="#ffda75" stroke-width="10" stroke-linecap="round"/>
  <path d="M628 350 L664 380 L628 410" fill="none" stroke="#ffda75" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="262" y="586" width="676" height="48" rx="24" fill="#101c2e"/>
  <text x="600" y="617" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#ffffff">Опасна не подсказка, а автоматизация длинной рутины</text>
</svg>
