<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#0b332f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="58" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#45ffd2">The Signal / Сигнал</text>
  <text x="600" y="112" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="900" fill="#ffffff">Как защищать зарплату</text>
  <text x="600" y="154" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="600" fill="#a9bdd4">Не словами про AI, а проверяемым результатом</text>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="190" y="218" width="820" height="74" rx="24" fill="#132238"/>
    <text x="250" y="264" font-size="24" font-weight="900" fill="#45ffd2">01</text>
    <text x="600" y="264" text-anchor="middle" font-size="24" font-weight="900" fill="#ffffff">найдите десять повторяемых задач</text>

    <rect x="190" y="318" width="820" height="74" rx="24" fill="#132238"/>
    <text x="250" y="364" font-size="24" font-weight="900" fill="#45ffd2">02</text>
    <text x="600" y="364" text-anchor="middle" font-size="24" font-weight="900" fill="#ffffff">ускорьте один процесс до результата</text>

    <rect x="190" y="418" width="820" height="74" rx="24" fill="#132238"/>
    <text x="250" y="464" font-size="24" font-weight="900" fill="#45ffd2">03</text>
    <text x="600" y="464" text-anchor="middle" font-size="24" font-weight="900" fill="#ffffff">научитесь проверять ответ модели</text>

    <rect x="190" y="518" width="820" height="74" rx="24" fill="#132238"/>
    <text x="250" y="564" font-size="24" font-weight="900" fill="#45ffd2">04</text>
    <text x="600" y="564" text-anchor="middle" font-size="24" font-weight="900" fill="#ffffff">покажите цифры: быстрее, точнее, дешевле</text>
  </g>
</svg>
