<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#0f172a"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="78" font-size="42" font-weight="850" fill="#ffffff">Пилот ради демо или ради экономики?</text>
    <text x="72" y="118" font-size="22" fill="#cbd5e1">Разница не в модели, а в вопросе, с которого начинается проект.</text>
    <rect x="80" y="170" width="500" height="380" rx="30" fill="#fef2f2"/>
    <rect x="620" y="170" width="500" height="380" rx="30" fill="#ecfdf5"/>
    <text x="330" y="232" text-anchor="middle" font-size="32" font-weight="850" fill="#991b1b">Пилот ради демо</text>
    <text x="870" y="232" text-anchor="middle" font-size="32" font-weight="850" fill="#166534">Пилот ради денег</text>
    <text x="130" y="305" font-size="23" fill="#7f1d1d">• что умеет модель?</text>
    <text x="130" y="357" font-size="23" fill="#7f1d1d">• красивый сценарий</text>
    <text x="130" y="409" font-size="23" fill="#7f1d1d">• нет владельца процесса</text>
    <text x="130" y="461" font-size="23" fill="#7f1d1d">• метрику ищут потом</text>
    <text x="670" y="305" font-size="23" fill="#14532d">• какой процесс дорогой?</text>
    <text x="670" y="357" font-size="23" fill="#14532d">• есть базовая линия</text>
    <text x="670" y="409" font-size="23" fill="#14532d">• владелец из бизнеса</text>
    <text x="670" y="461" font-size="23" fill="#14532d">• решение до старта</text>
    <rect x="260" y="585" width="680" height="50" rx="18" fill="#0ea5e9"/>
    <text x="600" y="618" text-anchor="middle" font-size="22" font-weight="850" fill="#ffffff">AI-проект должен менять процесс, а не только презентацию.</text>
  </g>
</svg>
