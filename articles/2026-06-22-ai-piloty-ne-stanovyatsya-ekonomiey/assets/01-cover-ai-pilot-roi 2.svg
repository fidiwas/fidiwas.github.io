<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#0b3b4a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1080" cy="100" r="155" fill="#0ea5e9" opacity="0.15"/>
  <circle cx="860" cy="610" r="180" fill="#14b8a6" opacity="0.12"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="78" y="82" font-size="22" font-weight="700" fill="#7dd3fc">The Signal / Сигнал</text>
    <text x="78" y="198" font-size="66" font-weight="850" fill="#ffffff">AI-пилот есть.</text>
    <text x="78" y="272" font-size="66" font-weight="850" fill="#ffffff">Где экономия?</text>
    <text x="78" y="348" font-size="50" font-weight="850" fill="#cffafe">Бизнес застрял</text>
    <text x="78" y="406" font-size="50" font-weight="850" fill="#cffafe">на демо</text>
    <text x="80" y="502" font-size="29" fill="#cbd5e1">Почему нейросеть умеет отвечать,</text>
    <text x="80" y="542" font-size="29" fill="#cbd5e1">но деньги не всегда появляются</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="720" y="120" width="380" height="420" rx="28" fill="url(#panel)" opacity="0.98"/>
    <text x="910" y="172" text-anchor="middle" font-size="25" font-weight="850" fill="#0f172a">Где теряется ROI</text>
    <g>
      <rect x="765" y="210" width="290" height="58" rx="16" fill="#e0f2fe"/>
      <text x="910" y="247" text-anchor="middle" font-size="22" font-weight="800" fill="#075985">данные</text>
    </g>
    <g>
      <rect x="765" y="292" width="290" height="58" rx="16" fill="#ccfbf1"/>
      <text x="910" y="329" text-anchor="middle" font-size="22" font-weight="800" fill="#115e59">интеграция</text>
    </g>
    <g>
      <rect x="765" y="374" width="290" height="58" rx="16" fill="#fef3c7"/>
      <text x="910" y="411" text-anchor="middle" font-size="22" font-weight="800" fill="#92400e">владелец</text>
    </g>
    <g>
      <rect x="765" y="456" width="290" height="58" rx="16" fill="#fee2e2"/>
      <text x="910" y="493" text-anchor="middle" font-size="22" font-weight="800" fill="#991b1b">метрика</text>
    </g>
  </g>
  <text x="600" y="630" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="#ffffff">Пилот проверяет демо. Бизнесу нужна измененная работа.</text>
</svg>
