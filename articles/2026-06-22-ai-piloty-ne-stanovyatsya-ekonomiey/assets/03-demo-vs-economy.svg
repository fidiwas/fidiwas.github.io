<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06101f"/>
      <stop offset="1" stop-color="#10233c"/>
    </linearGradient>
    <linearGradient id="bad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="good" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f3b3d"/>
      <stop offset="1" stop-color="#0b1f2e"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#7dd3fc" stroke-width="1">
    <path d="M65 580 C260 470 430 515 610 410 C810 290 930 320 1130 220" fill="none"/>
    <path d="M95 620 C300 500 470 535 665 430 C850 330 980 335 1135 280" fill="none"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="74" font-size="22" font-weight="800" fill="#7dd3fc">The Signal / Сигнал</text>
    <text x="70" y="144" font-size="52" font-weight="900" fill="#ffffff">Демо или результат?</text>
    <text x="72" y="193" font-size="25" fill="#cbd5e1">Одинаковый ИИ может дать разный итог</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="88" y="252" width="468" height="300" rx="30" fill="url(#bad)" stroke="#64748b" stroke-width="2"/>
    <text x="322" y="309" text-anchor="middle" font-size="32" font-weight="900" fill="#f8fafc">Пилот ради демо</text>
    <rect x="142" y="354" width="360" height="50" rx="16" fill="#e2e8f0"/>
    <text x="322" y="386" text-anchor="middle" font-size="21" font-weight="850" fill="#1e293b">показывает возможность</text>
    <rect x="142" y="424" width="360" height="50" rx="16" fill="#e2e8f0"/>
    <text x="322" y="456" text-anchor="middle" font-size="21" font-weight="850" fill="#1e293b">не меняет маршрут</text>
    <rect x="142" y="494" width="360" height="50" rx="16" fill="#fee2e2"/>
    <text x="322" y="526" text-anchor="middle" font-size="21" font-weight="850" fill="#991b1b">ROI ищут потом</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="644" y="252" width="468" height="300" rx="30" fill="url(#good)" stroke="#34d399" stroke-width="2"/>
    <text x="878" y="309" text-anchor="middle" font-size="32" font-weight="900" fill="#ecfeff">Пилот результата</text>
    <rect x="698" y="354" width="360" height="50" rx="16" fill="#ccfbf1"/>
    <text x="878" y="386" text-anchor="middle" font-size="21" font-weight="850" fill="#115e59">начинает с боли</text>
    <rect x="698" y="424" width="360" height="50" rx="16" fill="#dcfce7"/>
    <text x="878" y="456" text-anchor="middle" font-size="21" font-weight="850" fill="#166534">имеет владельца</text>
    <rect x="698" y="494" width="360" height="50" rx="16" fill="#fef3c7"/>
    <text x="878" y="526" text-anchor="middle" font-size="21" font-weight="850" fill="#92400e">считает метрику</text>
  </g>
</svg>
