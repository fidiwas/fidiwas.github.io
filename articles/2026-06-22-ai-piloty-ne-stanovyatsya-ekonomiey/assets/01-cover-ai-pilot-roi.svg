<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06101f"/>
      <stop offset="0.54" stop-color="#091a31"/>
      <stop offset="1" stop-color="#0a2f3a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#dcecff" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ee7ff"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)"/>
  <circle cx="940" cy="120" r="150" fill="#00b8ff" opacity="0.18" filter="url(#blur)"/>
  <circle cx="1040" cy="560" r="170" fill="#34d399" opacity="0.13" filter="url(#blur)"/>
  <circle cx="245" cy="550" r="150" fill="#7c3aed" opacity="0.10" filter="url(#blur)"/>
  <g opacity="0.24" stroke="#93c5fd" stroke-width="1">
    <path d="M80 555 C260 470 420 500 590 420 S930 280 1120 340" fill="none"/>
    <path d="M120 610 C320 515 500 535 690 450 S940 330 1110 385" fill="none"/>
    <path d="M760 80 C875 120 940 210 1118 190" fill="none"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="72" y="70" font-size="23" font-weight="800" fill="#7dd3fc">The Signal / Сигнал</text>
    <text x="72" y="170" font-size="70" font-weight="900" fill="#ffffff">ИИ внедрили,</text>
    <text x="72" y="250" font-size="70" font-weight="900" fill="#ffffff">а денег нет?</text>
    <text x="74" y="328" font-size="42" font-weight="850" fill="#bff7ff">Почему бизнес</text>
    <text x="74" y="382" font-size="42" font-weight="850" fill="#bff7ff">застревает на пилотах</text>
    <text x="76" y="488" font-size="28" fill="#c8d7ea">Модель отвечает быстро.</text>
    <text x="76" y="528" font-size="28" fill="#c8d7ea">Экономика появляется только в процессе.</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="720" y="104" width="382" height="440" rx="30" fill="url(#glass)" stroke="#a7f3d0" stroke-opacity="0.45" stroke-width="2"/>
    <text x="911" y="165" text-anchor="middle" font-size="27" font-weight="900" fill="#0f172a">Где теряется ROI</text>
    <rect x="770" y="207" width="282" height="60" rx="18" fill="#dbeafe"/>
    <text x="911" y="245" text-anchor="middle" font-size="23" font-weight="850" fill="#1d4ed8">нет метрики</text>
    <rect x="770" y="290" width="282" height="60" rx="18" fill="#ccfbf1"/>
    <text x="911" y="328" text-anchor="middle" font-size="23" font-weight="850" fill="#0f766e">грязные данные</text>
    <rect x="770" y="373" width="282" height="60" rx="18" fill="#fef3c7"/>
    <text x="911" y="411" text-anchor="middle" font-size="23" font-weight="850" fill="#92400e">старый процесс</text>
    <rect x="770" y="456" width="282" height="60" rx="18" fill="#fee2e2"/>
    <text x="911" y="494" text-anchor="middle" font-size="23" font-weight="850" fill="#991b1b">нет владельца</text>
  </g>
  <rect x="72" y="586" width="650" height="60" rx="20" fill="url(#blue)" opacity="0.95"/>
  <text x="397" y="624" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="900" fill="#03121f">Пилот не равен экономии</text>
</svg>
