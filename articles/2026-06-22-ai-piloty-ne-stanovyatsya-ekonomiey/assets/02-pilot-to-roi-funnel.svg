<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0d1b2f"/>
      <stop offset="1" stop-color="#0c343d"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12243c"/>
      <stop offset="1" stop-color="#0b1829"/>
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="14"/></filter>
  </defs>
  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1040" cy="112" r="150" fill="#38bdf8" opacity="0.16" filter="url(#soft)"/>
  <circle cx="170" cy="590" r="170" fill="#22c55e" opacity="0.13" filter="url(#soft)"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="76" font-size="22" font-weight="800" fill="#7dd3fc">The Signal / Сигнал</text>
    <text x="70" y="151" font-size="54" font-weight="900" fill="#ffffff">Пилот не равен экономии</text>
    <text x="72" y="200" font-size="25" fill="#cbd5e1">Деньги появляются только после встраивания в работу</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="82" y="292" width="170" height="112" rx="24" fill="url(#card)" stroke="#38bdf8" stroke-opacity="0.55"/>
    <text x="167" y="337" text-anchor="middle" font-size="22" font-weight="900" fill="#e0f2fe">модель</text>
    <text x="167" y="371" text-anchor="middle" font-size="18" fill="#93c5fd">умеет отвечать</text>
    <rect x="294" y="292" width="170" height="112" rx="24" fill="url(#card)" stroke="#2dd4bf" stroke-opacity="0.55"/>
    <text x="379" y="337" text-anchor="middle" font-size="22" font-weight="900" fill="#ccfbf1">данные</text>
    <text x="379" y="371" text-anchor="middle" font-size="18" fill="#99f6e4">есть контекст</text>
    <rect x="506" y="292" width="170" height="112" rx="24" fill="url(#card)" stroke="#facc15" stroke-opacity="0.55"/>
    <text x="591" y="337" text-anchor="middle" font-size="22" font-weight="900" fill="#fef3c7">процесс</text>
    <text x="591" y="371" text-anchor="middle" font-size="18" fill="#fde68a">меняет маршрут</text>
    <rect x="718" y="292" width="170" height="112" rx="24" fill="url(#card)" stroke="#fb7185" stroke-opacity="0.55"/>
    <text x="803" y="337" text-anchor="middle" font-size="22" font-weight="900" fill="#ffe4e6">метрика</text>
    <text x="803" y="371" text-anchor="middle" font-size="18" fill="#fecdd3">считает эффект</text>
    <rect x="930" y="276" width="190" height="144" rx="28" fill="#eafff7" stroke="#86efac" stroke-width="2"/>
    <text x="1025" y="338" text-anchor="middle" font-size="35" font-weight="900" fill="#064e3b">ROI</text>
    <text x="1025" y="379" text-anchor="middle" font-size="20" font-weight="800" fill="#047857">в деньгах</text>
  </g>
  <g stroke="#7dd3fc" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <path d="M255 348 H288"/>
    <path d="M467 348 H500"/>
    <path d="M679 348 H712"/>
    <path d="M891 348 H924"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="210" y="508" width="780" height="74" rx="24" fill="#071421" stroke="#2dd4bf" stroke-opacity="0.55"/>
    <text x="600" y="554" text-anchor="middle" font-size="25" font-weight="850" fill="#ffffff">Если одно звено пустое, экономика остается в презентации</text>
  </g>
</svg>
