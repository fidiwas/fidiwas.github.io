<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#f8fafc"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="78" font-size="42" font-weight="850" fill="#111827">Перед запуском AI-пилота</text>
    <text x="72" y="118" font-size="22" fill="#475569">Пять вопросов, без которых пилот легко станет презентацией.</text>
    <g>
      <rect x="80" y="175" width="320" height="135" rx="24" fill="#dbeafe"/>
      <text x="240" y="226" text-anchor="middle" font-size="28" font-weight="850" fill="#1e3a8a">1. Боль</text>
      <text x="240" y="268" text-anchor="middle" font-size="20" fill="#1d4ed8">какой процесс дорогой</text>
    </g>
    <g>
      <rect x="440" y="175" width="320" height="135" rx="24" fill="#ccfbf1"/>
      <text x="600" y="226" text-anchor="middle" font-size="28" font-weight="850" fill="#115e59">2. База</text>
      <text x="600" y="268" text-anchor="middle" font-size="20" fill="#0f766e">что измеряем сейчас</text>
    </g>
    <g>
      <rect x="800" y="175" width="320" height="135" rx="24" fill="#fef3c7"/>
      <text x="960" y="226" text-anchor="middle" font-size="28" font-weight="850" fill="#92400e">3. Владелец</text>
      <text x="960" y="268" text-anchor="middle" font-size="20" fill="#b45309">кто отвечает за деньги</text>
    </g>
    <g>
      <rect x="260" y="360" width="320" height="135" rx="24" fill="#ede9fe"/>
      <text x="420" y="411" text-anchor="middle" font-size="28" font-weight="850" fill="#5b21b6">4. Данные</text>
      <text x="420" y="453" text-anchor="middle" font-size="20" fill="#6d28d9">что можно отдавать AI</text>
    </g>
    <g>
      <rect x="620" y="360" width="320" height="135" rx="24" fill="#fee2e2"/>
      <text x="780" y="411" text-anchor="middle" font-size="28" font-weight="850" fill="#991b1b">5. Решение</text>
      <text x="780" y="453" text-anchor="middle" font-size="20" fill="#b91c1c">масштабируем или закрываем</text>
    </g>
    <rect x="160" y="565" width="880" height="58" rx="20" fill="#0f172a"/>
    <text x="600" y="602" text-anchor="middle" font-size="23" font-weight="850" fill="#ffffff">Если метрика не выбрана до пилота, ROI обычно ищут задним числом.</text>
  </g>
</svg>
