<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="78" y="72" font-size="22" font-weight="700" fill="#0f766e">The Signal / Сигнал</text>
    <text x="600" y="126" text-anchor="middle" font-size="42" font-weight="850" fill="#0f172a">До HR есть невидимый фильтр</text>
    <text x="600" y="166" text-anchor="middle" font-size="22" fill="#475569">Система ищет совпадения раньше, чем резюме увидит человек</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" filter="url(#shadow)">
    <rect x="84" y="260" width="180" height="118" rx="22" fill="#ffffff"/>
    <text x="174" y="308" text-anchor="middle" font-size="24" font-weight="850" fill="#0f172a">Резюме</text>
    <text x="174" y="342" text-anchor="middle" font-size="18" fill="#64748b">отклик</text>
    <rect x="318" y="260" width="180" height="118" rx="22" fill="#ecfeff"/>
    <text x="408" y="308" text-anchor="middle" font-size="24" font-weight="850" fill="#155e75">Парсер</text>
    <text x="408" y="342" text-anchor="middle" font-size="18" fill="#64748b">читает текст</text>
    <rect x="552" y="260" width="180" height="118" rx="22" fill="#eff6ff"/>
    <text x="642" y="308" text-anchor="middle" font-size="24" font-weight="850" fill="#1d4ed8">Скоринг</text>
    <text x="642" y="342" text-anchor="middle" font-size="18" fill="#64748b">ставит балл</text>
    <rect x="786" y="260" width="180" height="118" rx="22" fill="#f0fdf4"/>
    <text x="876" y="308" text-anchor="middle" font-size="24" font-weight="850" fill="#15803d">Shortlist</text>
    <text x="876" y="342" text-anchor="middle" font-size="18" fill="#64748b">короткий список</text>
    <rect x="1020" y="260" width="96" height="118" rx="22" fill="#fff7ed"/>
    <text x="1068" y="308" text-anchor="middle" font-size="24" font-weight="850" fill="#9a3412">HR</text>
    <text x="1068" y="342" text-anchor="middle" font-size="18" fill="#64748b">человек</text>
  </g>
  <path d="M264 319 H318 M498 319 H552 M732 319 H786 M966 319 H1020" stroke="url(#line)" stroke-width="8" stroke-linecap="round"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="116" y="462" width="968" height="84" rx="22" fill="#0f172a" opacity="0.94"/>
    <text x="600" y="498" text-anchor="middle" font-size="24" font-weight="850" fill="#ffffff">Слабое место: смысл опыта может потеряться до разговора</text>
    <text x="600" y="530" text-anchor="middle" font-size="19" fill="#cbd5e1">Поэтому резюме должно быть простым для системы и убедительным для человека</text>
  </g>
</svg>
