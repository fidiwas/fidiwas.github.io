<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#123042"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="78" y="72" font-size="22" font-weight="700" fill="#5eead4">The Signal / Сигнал</text>
    <text x="600" y="124" text-anchor="middle" font-size="42" font-weight="850" fill="#ffffff">Где теряется кандидат</text>
    <text x="600" y="164" text-anchor="middle" font-size="22" fill="#bfdbfe">Ошибка редко живет в одной точке. Чаще это цепочка.</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" filter="url(#shadow)">
    <rect x="92" y="232" width="235" height="126" rx="22" fill="#ffffff"/>
    <text x="210" y="280" text-anchor="middle" font-size="25" font-weight="850" fill="#0f172a">Формат</text>
    <text x="210" y="316" text-anchor="middle" font-size="18" fill="#64748b">система плохо</text>
    <text x="210" y="343" text-anchor="middle" font-size="18" fill="#64748b">читает файл</text>
    <rect x="358" y="232" width="235" height="126" rx="22" fill="#ecfeff"/>
    <text x="476" y="280" text-anchor="middle" font-size="25" font-weight="850" fill="#155e75">Слова</text>
    <text x="476" y="316" text-anchor="middle" font-size="18" fill="#64748b">навык есть,</text>
    <text x="476" y="343" text-anchor="middle" font-size="18" fill="#64748b">но назван иначе</text>
    <rect x="624" y="232" width="235" height="126" rx="22" fill="#fff7ed"/>
    <text x="742" y="280" text-anchor="middle" font-size="25" font-weight="850" fill="#9a3412">Порог</text>
    <text x="742" y="316" text-anchor="middle" font-size="18" fill="#64748b">балл ниже</text>
    <text x="742" y="343" text-anchor="middle" font-size="18" fill="#64748b">shortlist</text>
    <rect x="890" y="232" width="235" height="126" rx="22" fill="#f0fdf4"/>
    <text x="1008" y="280" text-anchor="middle" font-size="25" font-weight="850" fill="#15803d">Проверка</text>
    <text x="1008" y="316" text-anchor="middle" font-size="18" fill="#64748b">человек не</text>
    <text x="1008" y="343" text-anchor="middle" font-size="18" fill="#64748b">пересмотрел</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="184" y="446" width="832" height="96" rx="26" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
    <text x="600" y="488" text-anchor="middle" font-size="25" font-weight="850" fill="#ffffff">Хороший кандидат может выглядеть слабым</text>
    <text x="600" y="522" text-anchor="middle" font-size="20" fill="#cbd5e1">если опыт плохо переведен на язык вакансии</text>
  </g>
  <path d="M327 295 H358 M593 295 H624 M859 295 H890" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" opacity="0.72"/>
</svg>
