  <rect x="72" y="590" width="650" height="56" rx="20" fill="url(#mint)" opacity="0.97"/>
  <text x="397" y="626" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="900" fill="#04121f">Сначала считайте договор, потом ставку</text>
