    <text x="930" y="166" text-anchor="middle" font-size="28" font-weight="900" fill="#0f172a">Банковское приложение</text>
    <rect x="777" y="210" width="306" height="76" rx="20" fill="#ecfeff"/>
    <text x="822" y="249" font-size="22" font-weight="850" fill="#0e7490">Ставка ЦБ</text>
    <text x="1048" y="250" text-anchor="end" font-size="26" font-weight="900" fill="#047857">14,25%</text>
    <text x="822" y="271" font-size="16" font-weight="700" fill="#64748b">сегодня ниже, чем вчера</text>
    <rect x="777" y="326" width="306" height="76" rx="20" fill="#fff7ed"/>
    <text x="822" y="365" font-size="22" font-weight="850" fill="#9a3412">Кредит</text>
    <text x="1048" y="366" text-anchor="end" font-size="26" font-weight="900" fill="#991b1b">дорогой</text>
    <text x="822" y="390" font-size="16" font-weight="700" fill="#64748b">риск и договор важнее новости</text>
