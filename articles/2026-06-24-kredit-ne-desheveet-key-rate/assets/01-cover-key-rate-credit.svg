<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111f"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#073042"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ee7f9"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1015" cy="145" r="156" fill="#0ea5e9" opacity="0.16" filter="url(#soft)"/>
  <circle cx="196" cy="585" r="170" fill="#14b8a6" opacity="0.13" filter="url(#soft)"/>
  <g opacity="0.22" stroke="#7dd3fc" stroke-width="1">
    <path d="M64 534 C220 480 420 500 602 414 C784 328 952 320 1134 238" fill="none"/>
    <path d="M76 592 C260 512 486 548 690 438 C860 346 1010 360 1132 306" fill="none"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
