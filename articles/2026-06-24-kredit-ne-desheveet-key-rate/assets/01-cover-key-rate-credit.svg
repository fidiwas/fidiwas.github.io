    <text x="822" y="481" font-size="22" font-weight="850" fill="#166534">Вклад</text>
    <text x="1048" y="482" text-anchor="end" font-size="26" font-weight="900" fill="#0f766e">уже ниже</text>
    <text x="822" y="506" font-size="16" font-weight="700" fill="#64748b">новые условия меняются быстрее</text>
