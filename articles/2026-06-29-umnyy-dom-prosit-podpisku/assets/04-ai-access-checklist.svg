<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eefdf8"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="86" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900" fill="#0c1320">Что проверить уже сейчас</text>
  <text x="72" y="126" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#64748b">Не магия промптов, а работа с реальными задачами</text>

  <rect x="102" y="180" width="996" height="76" rx="24" fill="#ffffff" stroke="#d7e2f0"/>
  <text x="146" y="229" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#22c59e">01</text>
  <text x="230" y="229" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#0f172a">выберите одну задачу</text>
  <text x="650" y="229" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#64748b">письмо, таблица, договор, резюме</text>

  <rect x="102" y="278" width="996" height="76" rx="24" fill="#ffffff" stroke="#d7e2f0"/>
  <text x="146" y="327" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#22c59e">02</text>
  <text x="230" y="327" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#0f172a">проверяйте ответ</text>
  <text x="650" y="327" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#64748b">модель может ошибаться уверенно</text>

  <rect x="102" y="376" width="996" height="76" rx="24" fill="#ffffff" stroke="#d7e2f0"/>
  <text x="146" y="425" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#22c59e">03</text>
  <text x="230" y="425" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#0f172a">смотрите интеграции</text>
  <text x="650" y="425" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#64748b">документы, почта, CRM, закупки</text>

  <rect x="102" y="474" width="996" height="76" rx="24" fill="#0f172a"/>
  <text x="146" y="523" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#55efc4">04</text>
  <text x="230" y="523" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#ffffff">не путайте доступ с навыком</text>
  <text x="650" y="523" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#cbd5e1">фору дает не кнопка, а результат</text>
</svg>
