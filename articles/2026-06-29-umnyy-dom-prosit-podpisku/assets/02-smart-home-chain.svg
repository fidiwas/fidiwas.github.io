<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="72" y="70" font-size="22" font-weight="700" fill="#0f766e">The Signal / Сигнал</text>
    <text x="600" y="120" text-anchor="middle" font-size="42" font-weight="850" fill="#0f172a">Где теряется простота</text>
    <text x="600" y="160" text-anchor="middle" font-size="22" fill="#475569">Одна камера или лампочка тянет за собой целую цепочку условий</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="72" y="245" width="150" height="110" rx="18" fill="#ffffff"/>
    <text x="147" y="288" text-anchor="middle" font-size="22" font-weight="850" fill="#0f172a">устройство</text>
    <text x="147" y="318" text-anchor="middle" font-size="16" fill="#64748b">камера, лампа,</text>
    <text x="147" y="338" text-anchor="middle" font-size="16" fill="#64748b">датчик</text>
    <rect x="264" y="245" width="150" height="110" rx="18" fill="#ecfeff"/>
    <text x="339" y="288" text-anchor="middle" font-size="22" font-weight="850" fill="#155e75">приложение</text>
    <text x="339" y="322" text-anchor="middle" font-size="16" fill="#64748b">и аккаунт</text>
    <rect x="456" y="245" width="150" height="110" rx="18" fill="#fef3c7"/>
    <text x="531" y="288" text-anchor="middle" font-size="22" font-weight="850" fill="#92400e">облако</text>
    <text x="531" y="322" text-anchor="middle" font-size="16" fill="#64748b">серверы и</text>
    <text x="531" y="342" text-anchor="middle" font-size="16" fill="#64748b">удаленный доступ</text>
    <rect x="648" y="245" width="150" height="110" rx="18" fill="#dcfce7"/>
    <text x="723" y="288" text-anchor="middle" font-size="22" font-weight="850" fill="#166534">подписка</text>
    <text x="723" y="322" text-anchor="middle" font-size="16" fill="#64748b">история, AI,</text>
    <text x="723" y="342" text-anchor="middle" font-size="16" fill="#64748b">уведомления</text>
    <rect x="840" y="245" width="150" height="110" rx="18" fill="#ede9fe"/>
    <text x="915" y="288" text-anchor="middle" font-size="22" font-weight="850" fill="#5b21b6">экосистема</text>
    <text x="915" y="322" text-anchor="middle" font-size="16" fill="#64748b">Alexa, Apple,</text>
    <text x="915" y="342" text-anchor="middle" font-size="16" fill="#64748b">Google</text>
    <rect x="1032" y="245" width="110" height="110" rx="18" fill="#fff7ed"/>
    <text x="1087" y="288" text-anchor="middle" font-size="22" font-weight="850" fill="#9a3412">поддержка</text>
    <text x="1087" y="322" text-anchor="middle" font-size="16" fill="#64748b">прошивки</text>
  </g>
  <g stroke="#0f766e" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="228" y1="300" x2="256" y2="300"/>
    <line x1="420" y1="300" x2="448" y2="300"/>
    <line x1="612" y1="300" x2="640" y2="300"/>
    <line x1="804" y1="300" x2="832" y2="300"/>
    <line x1="996" y1="300" x2="1024" y2="300"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="218" y="452" width="764" height="76" rx="22" fill="#0f172a"/>
    <text x="600" y="484" text-anchor="middle" font-size="23" font-weight="850" fill="#ffffff">Проблема не в умности, а в условиях владения</text>
    <text x="600" y="512" text-anchor="middle" font-size="18" fill="#cbd5e1">чем длиннее цепочка, тем больше точек отказа и оплаты</text>
  </g>
</svg>
