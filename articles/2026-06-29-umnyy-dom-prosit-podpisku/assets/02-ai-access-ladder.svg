<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3f8ff"/>
      <stop offset="100%" stop-color="#eafcf7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#6f86a5" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="86" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900" fill="#0c1320">Кто получает сильный ИИ первым</text>
  <text x="72" y="125" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#64748b">Ранний доступ превращает модель в преимущество</text>

  <path d="M160 360 L402 282 L645 205 L892 126" fill="none" stroke="#2f80ed" stroke-width="8" stroke-linecap="round" opacity="0.42"/>
  <circle cx="160" cy="360" r="12" fill="#2f80ed"/>
  <circle cx="402" cy="282" r="12" fill="#2f80ed"/>
  <circle cx="645" cy="205" r="12" fill="#2f80ed"/>
  <circle cx="892" cy="126" r="12" fill="#2f80ed"/>

  <g filter="url(#shadow)">
    <rect x="82" y="420" width="226" height="138" rx="26" fill="#ffffff"/>
    <text x="195" y="469" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#0f172a">публичный</text>
    <text x="195" y="504" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#0f172a">чат</text>
    <text x="195" y="535" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#64748b">видят почти все</text>

    <rect x="330" y="350" width="226" height="138" rx="26" fill="#ffffff"/>
    <text x="443" y="399" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#0f172a">платный</text>
    <text x="443" y="434" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#0f172a">доступ</text>
    <text x="443" y="465" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#64748b">выше лимиты</text>

    <rect x="578" y="280" width="226" height="138" rx="26" fill="#ffffff"/>
    <text x="691" y="329" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#0f172a">корпорации</text>
    <text x="691" y="364" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#0f172a">и команды</text>
    <text x="691" y="395" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#64748b">реальные процессы</text>

    <rect x="826" y="210" width="226" height="138" rx="26" fill="#0f172a"/>
    <text x="939" y="259" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#ffffff">ранний</text>
    <text x="939" y="294" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#ffffff">доступ</text>
    <text x="939" y="325" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#55efc4">первая фора</text>
  </g>

  <rect x="674" y="472" width="486" height="82" rx="24" fill="#fff3c4"/>
  <text x="917" y="508" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" fill="#172033">раньше тестируешь</text>
  <text x="917" y="534" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#172033">раньше меняешь работу</text>
</svg>
