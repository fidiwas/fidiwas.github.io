<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#102842"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15243a"/>
      <stop offset="100%" stop-color="#0f1b2d"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="260" fill="#4fd1c5" opacity="0.08"/>
  <text x="70" y="86" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900" fill="#f8fafc">Где появляется фора</text>
  <text x="72" y="126" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#9fb2ca">Не в демоверсии, а в ежедневных рабочих задачах</text>

  <g>
    <rect x="70" y="200" width="196" height="210" rx="26" fill="url(#card)" stroke="#253b59"/>
    <text x="168" y="266" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#ffffff">документы</text>
    <text x="168" y="314" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#9fb2ca">быстрее</text>
    <text x="168" y="344" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#9fb2ca">проверка</text>

    <rect x="296" y="200" width="196" height="210" rx="26" fill="url(#card)" stroke="#253b59"/>
    <text x="394" y="266" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#ffffff">продажи</text>
    <text x="394" y="314" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#9fb2ca">лучше</text>
    <text x="394" y="344" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#9fb2ca">тексты</text>

    <rect x="522" y="200" width="196" height="210" rx="26" fill="url(#card)" stroke="#253b59"/>
    <text x="620" y="266" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#ffffff">код</text>
    <text x="620" y="314" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#9fb2ca">меньше</text>
    <text x="620" y="344" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#9fb2ca">ошибок</text>

    <rect x="748" y="200" width="196" height="210" rx="26" fill="url(#card)" stroke="#253b59"/>
    <text x="846" y="266" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#ffffff">анализ</text>
    <text x="846" y="314" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#9fb2ca">быстрее</text>
    <text x="846" y="344" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#9fb2ca">выводы</text>

    <rect x="974" y="200" width="156" height="210" rx="26" fill="#fff1b8"/>
    <text x="1052" y="266" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#172033">решения</text>
    <text x="1052" y="314" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#172033">дороже</text>
    <text x="1052" y="344" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#172033">ошибка</text>
  </g>

  <rect x="185" y="482" width="830" height="78" rx="24" fill="#e8fff7"/>
  <text x="600" y="531" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900" fill="#11352f">у кого модель сильнее, тот быстрее доходит до результата</text>
</svg>
