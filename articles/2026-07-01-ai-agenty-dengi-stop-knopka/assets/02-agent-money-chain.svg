<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef7ff"/>
      <stop offset="1" stop-color="#e6fffb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="76" y="72" font-size="20" font-weight="800" fill="#0f766e">The Signal / Сигнал</text>
    <text x="600" y="130" text-anchor="middle" font-size="44" font-weight="850" fill="#0f172a">Где появляется риск</text>
    <text x="600" y="172" text-anchor="middle" font-size="23" fill="#475569">AI-агент связывает выбор, деньги и спор в одну цепочку</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" filter="url(#shadow)">
    <rect x="64" y="274" width="164" height="96" rx="22" fill="#ffffff"/>
    <text x="146" y="316" text-anchor="middle" font-size="20" font-weight="850" fill="#0f172a">запрос</text>
    <text x="146" y="348" text-anchor="middle" font-size="16" fill="#64748b">что купить</text>
    <rect x="278" y="274" width="164" height="96" rx="22" fill="#dcfce7"/>
    <text x="360" y="316" text-anchor="middle" font-size="20" font-weight="850" fill="#0f172a">выбор</text>
    <text x="360" y="348" text-anchor="middle" font-size="16" fill="#0f766e">товар найден</text>
    <rect x="492" y="274" width="164" height="96" rx="22" fill="#fef3c7"/>
    <text x="574" y="316" text-anchor="middle" font-size="20" font-weight="850" fill="#0f172a">лимит</text>
    <text x="574" y="348" text-anchor="middle" font-size="16" fill="#92400e">проверка суммы</text>
    <rect x="706" y="274" width="164" height="96" rx="22" fill="#d1fae5"/>
    <text x="788" y="316" text-anchor="middle" font-size="20" font-weight="850" fill="#0f172a">платеж</text>
    <text x="788" y="348" text-anchor="middle" font-size="16" fill="#047857">карта или токен</text>
    <rect x="920" y="274" width="164" height="96" rx="22" fill="#fee2e2"/>
    <text x="1002" y="316" text-anchor="middle" font-size="20" font-weight="850" fill="#0f172a">спор</text>
    <text x="1002" y="348" text-anchor="middle" font-size="16" fill="#991b1b">если сбой</text>
  </g>
  <g stroke="#38bdf8" stroke-width="5" stroke-linecap="round" opacity="0.65">
    <path d="M238 322h30"/>
    <path d="M452 322h30"/>
    <path d="M666 322h30"/>
    <path d="M880 322h30"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="270" y="458" width="660" height="76" rx="22" fill="#0f172a"/>
    <text x="600" y="489" text-anchor="middle" font-size="21" font-weight="850" fill="#ffffff">слабое место - между намерением и оплатой</text>
    <text x="600" y="517" text-anchor="middle" font-size="16" fill="#cbd5e1">если агент понял запрос не так, спор начинается уже после покупки</text>
  </g>
  <rect x="70" y="562" width="72" height="50" rx="16" fill="#111827" opacity="0.90"/>
  <text x="106" y="594" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="850" fill="#94a3b8">01</text>
