<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="76" y="72" font-size="20" font-weight="800" fill="#5eead4">The Signal / Сигнал</text>
    <text x="600" y="128" text-anchor="middle" font-size="44" font-weight="850" fill="#ffffff">Перед AI-платежом</text>
    <text x="600" y="168" text-anchor="middle" font-size="22" fill="#cbd5e1">пять вопросов до того, как подключать карту</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" filter="url(#shadow)">
    <rect x="250" y="232" width="700" height="48" rx="16" fill="#182235"/>
    <text x="304" y="263" font-size="19" font-weight="850" fill="#5eead4">01</text>
    <text x="390" y="263" font-size="19" font-weight="850" fill="#ffffff">какой лимит на сумму?</text>
    <rect x="250" y="302" width="700" height="48" rx="16" fill="#182235"/>
    <text x="304" y="333" font-size="19" font-weight="850" fill="#5eead4">02</text>
    <text x="390" y="333" font-size="19" font-weight="850" fill="#ffffff">какие категории разрешены?</text>
    <rect x="250" y="372" width="700" height="48" rx="16" fill="#182235"/>
    <text x="304" y="403" font-size="19" font-weight="850" fill="#5eead4">03</text>
    <text x="390" y="403" font-size="19" font-weight="850" fill="#ffffff">нужен ли финальный клик?</text>
    <rect x="250" y="442" width="700" height="48" rx="16" fill="#182235"/>
    <text x="304" y="473" font-size="19" font-weight="850" fill="#5eead4">04</text>
    <text x="390" y="473" font-size="19" font-weight="850" fill="#ffffff">видно ли, почему выбран товар?</text>
    <rect x="250" y="512" width="700" height="48" rx="16" fill="#182235"/>
    <text x="304" y="543" font-size="19" font-weight="850" fill="#5eead4">05</text>
    <text x="390" y="543" font-size="19" font-weight="850" fill="#ffffff">кто принимает спор?</text>
  </g>
  <rect x="70" y="562" width="72" height="50" rx="16" fill="#020617" opacity="0.90"/>
  <text x="106" y="594" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="850" fill="#1f2937">04</text>
</svg>
