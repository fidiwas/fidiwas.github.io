<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="76" y="72" font-size="20" font-weight="800" fill="#0f766e">The Signal / Сигнал</text>
    <text x="600" y="130" text-anchor="middle" font-size="46" font-weight="850" fill="#0f172a">Где должна быть кнопка стоп</text>
    <text x="600" y="172" text-anchor="middle" font-size="22" fill="#475569">не после спора, а до движения денег</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" filter="url(#shadow)">
    <rect x="118" y="250" width="250" height="120" rx="24" fill="#ffffff"/>
    <text x="243" y="296" text-anchor="middle" font-size="21" font-weight="850" fill="#0f172a">1. лимит</text>
    <text x="243" y="329" text-anchor="middle" font-size="16" fill="#64748b">сколько можно</text>
    <text x="243" y="351" text-anchor="middle" font-size="16" fill="#0f766e">потратить</text>
    <rect x="474" y="250" width="250" height="120" rx="24" fill="#ffffff"/>
    <text x="599" y="296" text-anchor="middle" font-size="21" font-weight="850" fill="#0f172a">2. финальный клик</text>
    <text x="599" y="329" text-anchor="middle" font-size="16" fill="#64748b">деньги уходят</text>
    <text x="599" y="351" text-anchor="middle" font-size="16" fill="#0f766e">только после ok</text>
    <rect x="830" y="250" width="250" height="120" rx="24" fill="#fff7ed"/>
    <text x="955" y="296" text-anchor="middle" font-size="21" font-weight="850" fill="#0f172a">3. журнал</text>
    <text x="955" y="329" text-anchor="middle" font-size="16" fill="#64748b">почему выбран</text>
    <text x="955" y="351" text-anchor="middle" font-size="16" fill="#b45309">этот вариант</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="252" y="468" width="696" height="76" rx="24" fill="#0f172a"/>
    <text x="600" y="499" text-anchor="middle" font-size="21" font-weight="850" fill="#ffffff">нормальная граница - человек подтверждает оплату</text>
    <text x="600" y="529" text-anchor="middle" font-size="16" fill="#cbd5e1">агент готовит, человек видит лимит, причину и путь отмены</text>
  </g>
  <rect x="70" y="562" width="72" height="50" rx="16" fill="#111827" opacity="0.90"/>
  <text x="106" y="594" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="850" fill="#94a3b8">03</text>
</svg>
