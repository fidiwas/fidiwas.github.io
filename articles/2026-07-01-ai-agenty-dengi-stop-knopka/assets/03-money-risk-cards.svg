<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080d1a"/>
      <stop offset="1" stop-color="#132033"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="76" y="72" font-size="20" font-weight="800" fill="#5eead4">The Signal / Сигнал</text>
    <text x="600" y="128" text-anchor="middle" font-size="46" font-weight="850" fill="#ffffff">Что может пойти не так</text>
    <text x="600" y="168" text-anchor="middle" font-size="22" fill="#cbd5e1">AI-покупка выглядит простой, пока не появляется спор</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" filter="url(#shadow)">
    <rect x="102" y="246" width="220" height="124" rx="22" fill="#172033"/>
    <text x="212" y="293" text-anchor="middle" font-size="20" font-weight="850" fill="#ffffff">не тот товар</text>
    <text x="212" y="326" text-anchor="middle" font-size="16" fill="#94a3b8">агент понял</text>
    <text x="212" y="349" text-anchor="middle" font-size="16" fill="#94a3b8">запрос иначе</text>
    <rect x="364" y="246" width="220" height="124" rx="22" fill="#172033"/>
    <text x="474" y="293" text-anchor="middle" font-size="20" font-weight="850" fill="#ffffff">лишняя оплата</text>
    <text x="474" y="326" text-anchor="middle" font-size="16" fill="#94a3b8">цена выросла</text>
    <text x="474" y="349" text-anchor="middle" font-size="16" fill="#94a3b8">перед кликом</text>
    <rect x="626" y="246" width="220" height="124" rx="22" fill="#172033"/>
    <text x="736" y="293" text-anchor="middle" font-size="20" font-weight="850" fill="#ffffff">подписка</text>
    <text x="736" y="326" text-anchor="middle" font-size="16" fill="#94a3b8">галочка осталась</text>
    <text x="736" y="349" text-anchor="middle" font-size="16" fill="#94a3b8">по умолчанию</text>
    <rect x="888" y="246" width="220" height="124" rx="22" fill="#172033"/>
    <text x="998" y="293" text-anchor="middle" font-size="20" font-weight="850" fill="#ffffff">спор завис</text>
    <text x="998" y="326" text-anchor="middle" font-size="16" fill="#94a3b8">банк, магазин</text>
    <text x="998" y="349" text-anchor="middle" font-size="16" fill="#94a3b8">или платформа?</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="256" y="456" width="688" height="78" rx="22" fill="#fef3c7"/>
    <text x="600" y="488" text-anchor="middle" font-size="21" font-weight="850" fill="#0f172a">главный вопрос - не "купит ли?", а "как остановить?"</text>
    <text x="600" y="519" text-anchor="middle" font-size="16" fill="#475569">без журнала решений покупатель спорит вслепую</text>
  </g>
  <rect x="70" y="562" width="72" height="50" rx="16" fill="#020617" opacity="0.90"/>
  <text x="106" y="594" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="850" fill="#1f2937">02</text>
</svg>
