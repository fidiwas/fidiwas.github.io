<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#020617" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="#101827"/>
  <text x="70" y="78" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" fill="#ffffff">Что происходит с правилами</text>
  <text x="72" y="118" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#cbd5e1">Скидки по картам обсуждаются отдельно.</text>
  <text x="72" y="148" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#cbd5e1">Но это часть большого регулирования платформ.</text>
  <line x1="125" y1="340" x2="1075" y2="340" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>
  <g filter="url(#shadow)" font-family="Arial, Helvetica, sans-serif">
    <circle cx="165" cy="340" r="24" fill="#38bdf8"/>
    <rect x="60" y="395" width="210" height="132" rx="22" fill="#ffffff"/>
    <text x="165" y="431" text-anchor="middle" dominant-baseline="middle" font-size="24" font-weight="800" fill="#0f172a">Февраль</text>
    <text x="165" y="464" text-anchor="middle" dominant-baseline="middle" font-size="18" fill="#475569">меморандум</text>
    <text x="165" y="493" text-anchor="middle" dominant-baseline="middle" font-size="18" fill="#475569">о скидках</text>
    <circle cx="460" cy="340" r="24" fill="#22c55e"/>
    <rect x="350" y="184" width="220" height="132" rx="22" fill="#ffffff"/>
    <text x="460" y="220" text-anchor="middle" dominant-baseline="middle" font-size="24" font-weight="800" fill="#0f172a">Июнь</text>
    <text x="460" y="253" text-anchor="middle" dominant-baseline="middle" font-size="18" fill="#475569">ПМЭФ и</text>
    <text x="460" y="282" text-anchor="middle" dominant-baseline="middle" font-size="18" fill="#475569">позиция ЦБ</text>
    <circle cx="745" cy="340" r="24" fill="#f59e0b"/>
    <rect x="630" y="395" width="230" height="132" rx="22" fill="#ffffff"/>
    <text x="745" y="431" text-anchor="middle" dominant-baseline="middle" font-size="24" font-weight="800" fill="#0f172a">Осень</text>
    <text x="745" y="464" text-anchor="middle" dominant-baseline="middle" font-size="18" fill="#475569">ожидаются</text>
    <text x="745" y="493" text-anchor="middle" dominant-baseline="middle" font-size="18" fill="#475569">решения</text>
    <circle cx="1035" cy="340" r="24" fill="#fb7185"/>
    <rect x="915" y="184" width="240" height="132" rx="22" fill="#ffffff"/>
    <text x="1035" y="220" text-anchor="middle" dominant-baseline="middle" font-size="24" font-weight="800" fill="#0f172a">1 октября</text>
    <text x="1035" y="253" text-anchor="middle" dominant-baseline="middle" font-size="18" fill="#475569">закон о</text>
    <text x="1035" y="282" text-anchor="middle" dominant-baseline="middle" font-size="18" fill="#475569">платформах</text>
  </g>
  <text x="70" y="612" font-family="Arial, Helvetica, sans-serif" font-size="23" fill="#e2e8f0">Важно: скидочные правила и закон N 289-ФЗ связаны, но это не одно и то же.</text>
</svg>
