<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="58%" stop-color="#102331"/>
      <stop offset="100%" stop-color="#122c2d"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="slate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1020" cy="110" r="210" fill="#38bdf8" opacity="0.08"/>
  <circle cx="125" cy="560" r="250" fill="#22c55e" opacity="0.07"/>
  <circle cx="580" cy="610" r="210" fill="#f59e0b" opacity="0.05"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="90" y="112" font-size="24" font-weight="700" fill="#7dd3fc" opacity="0.9">The Signal / Сигнал</text>
    <text x="90" y="245" font-size="76" font-weight="850" fill="#ffffff">Почему</text>
    <text x="90" y="331" font-size="76" font-weight="850" fill="#ffffff">цена</text>
    <text x="90" y="417" font-size="76" font-weight="850" fill="#ffffff">меняется?</text>
    <rect x="92" y="455" width="118" height="8" rx="4" fill="#22c55e"/>
    <text x="90" y="515" font-size="29" fill="#cbd5e1">Одна корзина.</text>
    <text x="90" y="555" font-size="29" fill="#cbd5e1">Разные карты.</text>
    <text x="90" y="595" font-size="29" font-weight="800" fill="#5eead4">Разные суммы.</text>
  </g>

  <g filter="url(#softShadow)" font-family="Arial, Helvetica, sans-serif">
    <rect x="620" y="86" width="490" height="504" rx="42" fill="#f8fafc"/>
    <rect x="655" y="122" width="420" height="62" rx="24" fill="#e2e8f0"/>
    <text x="865" y="163" text-anchor="middle" font-size="27" font-weight="850" fill="#1e293b">Корзина</text>

    <rect x="660" y="218" width="410" height="116" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="690" y="251" width="68" height="52" rx="15" fill="#cbd5e1"/>
    <path d="M705 268h38M705 286h31" stroke="#64748b" stroke-width="7" stroke-linecap="round"/>
    <text x="905" y="265" text-anchor="middle" font-size="28" font-weight="850" fill="#0f172a">Один товар</text>
    <text x="905" y="299" text-anchor="middle" font-size="19" fill="#64748b">Сумма меняется</text>
    <text x="905" y="323" text-anchor="middle" font-size="19" fill="#64748b">на последнем шаге</text>

    <text x="865" y="378" text-anchor="middle" font-size="22" font-weight="750" fill="#334155">Способ оплаты</text>

    <rect x="660" y="405" width="190" height="112" rx="28" fill="url(#green)"/>
    <text x="755" y="446" text-anchor="middle" font-size="18" font-weight="800" fill="#ecfdf5">Карта платформы</text>
    <text x="755" y="489" text-anchor="middle" font-size="36" font-weight="850" fill="#ffffff">9 300 ₽</text>

    <rect x="880" y="405" width="190" height="112" rx="28" fill="url(#slate)"/>
    <text x="975" y="446" text-anchor="middle" font-size="18" font-weight="800" fill="#e2e8f0">Другая карта</text>
    <text x="975" y="489" text-anchor="middle" font-size="36" font-weight="850" fill="#ffffff">10 000 ₽</text>

    <text x="865" y="552" text-anchor="middle" font-size="18" font-weight="700" fill="#0369a1">Разница появляется</text>
    <text x="865" y="576" text-anchor="middle" font-size="18" font-weight="700" fill="#0369a1">перед оплатой</text>
  </g>
</svg>
