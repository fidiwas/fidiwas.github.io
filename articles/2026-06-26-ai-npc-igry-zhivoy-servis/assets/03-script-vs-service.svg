<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ccfbf1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="72" y="70" font-size="22" font-weight="700" fill="#0f766e">The Signal / Сигнал</text>
    <text x="600" y="122" text-anchor="middle" font-size="42" font-weight="850" fill="#0f172a">Скрипт против сервиса</text>
    <text x="600" y="162" text-anchor="middle" font-size="22" fill="#475569">AI-NPC добавляет не только свободу, но и постоянный слой поддержки</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="104" y="220" width="436" height="342" rx="24" fill="#ffffff"/>
    <text x="322" y="268" text-anchor="middle" font-size="31" font-weight="850" fill="#0f172a">скриптовый NPC</text>
    <rect x="154" y="316" width="336" height="50" rx="12" fill="#f1f5f9"/>
    <text x="322" y="348" text-anchor="middle" font-size="20" font-weight="800" fill="#334155">реплики заранее написаны</text>
    <rect x="154" y="386" width="336" height="50" rx="12" fill="#f1f5f9"/>
    <text x="322" y="418" text-anchor="middle" font-size="20" font-weight="800" fill="#334155">поведение протестировано</text>
    <rect x="154" y="456" width="336" height="50" rx="12" fill="#f1f5f9"/>
    <text x="322" y="488" text-anchor="middle" font-size="20" font-weight="800" fill="#334155">беднее, но предсказуем</text>
    <rect x="660" y="220" width="436" height="342" rx="24" fill="#0f172a"/>
    <text x="878" y="268" text-anchor="middle" font-size="31" font-weight="850" fill="#ffffff">AI-NPC как сервис</text>
    <rect x="710" y="316" width="336" height="50" rx="12" fill="#ecfeff"/>
    <text x="878" y="348" text-anchor="middle" font-size="20" font-weight="800" fill="#155e75">модель и обновления</text>
    <rect x="710" y="386" width="336" height="50" rx="12" fill="#fef3c7"/>
    <text x="878" y="418" text-anchor="middle" font-size="20" font-weight="800" fill="#92400e">правила, модерация, QA</text>
    <rect x="710" y="456" width="336" height="50" rx="12" fill="#dcfce7"/>
    <text x="878" y="488" text-anchor="middle" font-size="20" font-weight="800" fill="#166534">богаче, но дороже</text>
  </g>
  <text x="600" y="614" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="850" fill="#0f172a">Чем живее персонаж, тем больше вокруг него инфраструктуры</text>
</svg>
