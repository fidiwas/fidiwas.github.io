<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#164e63"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="72" y="72" font-size="22" font-weight="700" fill="#67e8f9">The Signal / Сигнал</text>
    <text x="600" y="122" text-anchor="middle" font-size="42" font-weight="850" fill="#ffffff">Где ломается магия AI-NPC</text>
    <text x="600" y="162" text-anchor="middle" font-size="22" fill="#cbd5e1">Свобода персонажа становится проблемой, если игра теряет контроль</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="92" y="224" width="300" height="104" rx="20" fill="#ecfeff"/>
    <text x="242" y="264" text-anchor="middle" font-size="24" font-weight="850" fill="#155e75">задержка</text>
    <text x="242" y="296" text-anchor="middle" font-size="17" fill="#475569">пауза убивает темп</text>
    <rect x="450" y="224" width="300" height="104" rx="20" fill="#fef3c7"/>
    <text x="600" y="264" text-anchor="middle" font-size="24" font-weight="850" fill="#92400e">лор</text>
    <text x="600" y="296" text-anchor="middle" font-size="17" fill="#475569">модель может выдумать мир</text>
    <rect x="808" y="224" width="300" height="104" rx="20" fill="#dcfce7"/>
    <text x="958" y="264" text-anchor="middle" font-size="24" font-weight="850" fill="#166534">действия</text>
    <text x="958" y="296" text-anchor="middle" font-size="17" fill="#475569">ошибка становится багом</text>
    <rect x="92" y="388" width="300" height="104" rx="20" fill="#fee2e2"/>
    <text x="242" y="428" text-anchor="middle" font-size="24" font-weight="850" fill="#991b1b">голос и права</text>
    <text x="242" y="460" text-anchor="middle" font-size="17" fill="#475569">нужны согласие и оплата</text>
    <rect x="450" y="388" width="300" height="104" rx="20" fill="#ede9fe"/>
    <text x="600" y="428" text-anchor="middle" font-size="24" font-weight="850" fill="#5b21b6">платформы</text>
    <text x="600" y="460" text-anchor="middle" font-size="17" fill="#475569">guardrails и раскрытие AI</text>
    <rect x="808" y="388" width="300" height="104" rx="20" fill="#fff7ed"/>
    <text x="958" y="428" text-anchor="middle" font-size="24" font-weight="850" fill="#9a3412">стоимость</text>
    <text x="958" y="460" text-anchor="middle" font-size="17" fill="#475569">инференс, QA, поддержка</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="184" y="548" width="832" height="58" rx="29" fill="#ffffff"/>
    <text x="600" y="584" text-anchor="middle" font-size="21" font-weight="850" fill="#0f172a">Хороший AI-NPC говорит свободно, но живет в жестких правилах</text>
  </g>
</svg>
