<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#121a2c"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="0" y="548" width="1200" height="127" fill="#06111f" opacity="0.78"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="72" y="72" font-size="22" font-weight="700" fill="#5eead4">The Signal / Сигнал</text>
    <text x="72" y="174" font-size="52" font-weight="850" fill="#ffffff">Персонажи</text>
    <text x="72" y="238" font-size="52" font-weight="850" fill="#ffffff">в играх оживают</text>
    <text x="74" y="330" font-size="42" font-weight="850" fill="#fef3c7">Кто за это</text>
    <text x="74" y="386" font-size="42" font-weight="850" fill="#fef3c7">заплатит?</text>
    <text x="76" y="470" font-size="27" fill="#dbeafe">ИИ-персонажам нужны модели,</text>
    <text x="76" y="510" font-size="27" fill="#dbeafe">память, голос и контроль.</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" filter="url(#softShadow)">
    <rect x="740" y="94" width="388" height="442" rx="24" fill="url(#panel)"/>
    <text x="934" y="154" text-anchor="middle" font-size="24" font-weight="850" fill="#0f172a">AI companion</text>
    <circle cx="934" cy="258" r="66" fill="#0f766e"/>
    <circle cx="910" cy="244" r="8" fill="#ccfbf1"/>
    <circle cx="958" cy="244" r="8" fill="#ccfbf1"/>
    <path d="M900 282 Q934 306 968 282" fill="none" stroke="#ccfbf1" stroke-width="7" stroke-linecap="round"/>
    <rect x="802" y="358" width="264" height="56" rx="14" fill="#ecfeff"/>
    <text x="934" y="393" text-anchor="middle" font-size="20" font-weight="850" fill="#155e75">слушает игрока</text>
    <rect x="802" y="430" width="264" height="56" rx="14" fill="#fff7ed"/>
    <text x="934" y="465" text-anchor="middle" font-size="20" font-weight="850" fill="#9a3412">действует в мире</text>
  </g>
  <g stroke="#5eead4" stroke-width="3" opacity="0.75">
    <line x1="690" y1="242" x2="760" y2="242"/>
    <line x1="690" y1="386" x2="760" y2="386"/>
    <line x1="690" y1="456" x2="760" y2="456"/>
  </g>
  <text x="600" y="626" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#ffffff">Новая магия игр упирается в цену контроля</text>
</svg>
