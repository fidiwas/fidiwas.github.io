<script>
(() => {
  const AUTH_USER = 'admin';
  const AUTH_SALT = '3e45be262781a5bb53ddc3f62d950674';
  const AUTH_DIGEST = '6e5a1817247c49d898888f13377e6949e977922104630041dbce6e2b869b1593';
  const SESSION_KEY = 'the_signal_admin_session_v1';
  const MAX_AGE_MS = 30 * 24 * 60 * 60 * 1000;

  const enc = new TextEncoder();

  async function sha256(value) {
    const bytes = await crypto.subtle.digest("SHA-256", enc.encode(value));
    return Array.from(new Uint8Array(bytes))
      .map((item) => item.toString(16).padStart(2, "0"))
      .join("");
  }

  function validStoredSession() {
    try {
      const raw = localStorage.getItem(SESSION_KEY);
      if (!raw) return false;
      const session = JSON.parse(raw);
      return session.digest === AUTH_DIGEST && Date.now() - session.createdAt < MAX_AGE_MS;
    } catch (_) {
      return false;
    }
  }

  function reveal() {
    document.documentElement.classList.remove("signal-auth-pending");
    const style = document.getElementById("signal-auth-prehide");
    if (style) style.remove();
    renderLogout();
  }

  function renderLogout() {
    if (document.getElementById("signal-auth-logout")) return;
    const button = document.createElement("button");
    button.id = "signal-auth-logout";
    button.type = "button";
    button.innerHTML = `
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M12 3v9" />
        <path d="M7.05 6.25a8 8 0 1 0 9.9 0" />
      </svg>
    `;
    button.setAttribute("aria-label", "Выйти из панели");
    button.setAttribute("title", "Выйти");
    button.style.cssText = [
      "position:fixed",
      "right:max(18px, env(safe-area-inset-right))",
      "top:max(18px, env(safe-area-inset-top))",
      "z-index:2147483646",
      "width:46px",
      "height:46px",
      "display:grid",
      "place-items:center",
      "border:1px solid rgba(255,255,255,.34)",
      "border-radius:16px",
      "padding:0",
      "color:#fff",
      "background:linear-gradient(145deg, #ff5a5f 0%, #e11d2e 52%, #9f1020 100%)",
      "box-shadow:0 14px 30px rgba(225,29,46,.28), inset 0 1px 0 rgba(255,255,255,.34)",
      "cursor:pointer"
    ].join(";");
    button.querySelector("svg").style.cssText = [
      "width:23px",
      "height:23px",
      "fill:none",
      "stroke:currentColor",
      "stroke-width:2.4",
      "stroke-linecap:round",
      "stroke-linejoin:round",
      "filter:drop-shadow(0 1px 1px rgba(0,0,0,.18))"
    ].join(";");
    button.addEventListener("click", () => {
      localStorage.removeItem(SESSION_KEY);
      location.reload();
    });
    button.addEventListener("mouseenter", () => {
      button.style.transform = "translateY(-1px)";
      button.style.boxShadow = "0 18px 36px rgba(225,29,46,.34), inset 0 1px 0 rgba(255,255,255,.38)";
    });
    button.addEventListener("mouseleave", () => {
      button.style.transform = "";
      button.style.boxShadow = "0 14px 30px rgba(225,29,46,.28), inset 0 1px 0 rgba(255,255,255,.34)";
    });
    document.body.appendChild(button);
  }

  function renderLogin(errorText = "") {
    document.documentElement.classList.remove("signal-auth-pending");
    document.body.innerHTML = "";
    const wrap = document.createElement("main");
    wrap.innerHTML = `
      <section class="signal-login">
        <div class="signal-login__shell">

              </svg>

            <p>Платформа для создания<br />и публикации контента на Дзене</p>
            <div class="signal-login__stage" aria-hidden="true">

            </div>

              <label>
                <span>Пароль</span>
                <span class="signal-login__field">
                  <input name="password" type="password" autocomplete="current-password" placeholder="Введите пароль" required />

            <div class="signal-login__signup">Нет аккаунта? <a href="/">Зарегистрироваться</a></div>

        </div>
      </section>

    document.head.appendChild(style);

    const form = document.getElementById("signal-auth-form");
    const passwordInput = form.querySelector('input[name="password"]');
    const eyeButton = form.querySelector(".signal-login__eye-button");
    if (passwordInput && eyeButton) {
      eyeButton.addEventListener("click", () => {
        const visible = passwordInput.type === "text";
        passwordInput.type = visible ? "password" : "text";
        eyeButton.setAttribute("aria-pressed", visible ? "false" : "true");
        eyeButton.setAttribute("aria-label", visible ? "Показать пароль" : "Скрыть пароль");
      });
    }
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = new FormData(form);
      const user = String(data.get("user") || "").trim();
      const password = String(data.get("password") || "");
      const digest = await sha256(`${AUTH_SALT}:${user}:${password}`);
      if (user === AUTH_USER && digest === AUTH_DIGEST) {
        localStorage.setItem(SESSION_KEY, JSON.stringify({
          digest,
          createdAt: Date.now()
        }));
        location.reload();
      } else {
        renderLogin("Неверный логин или пароль.");
      }
    });
  }

  if (!crypto.subtle) {
    renderLogin("Браузер не поддерживает защищенную проверку пароля.");
    return;
  }
  if (validStoredSession()) {
    reveal();
  } else {
    renderLogin();
  }
})();
