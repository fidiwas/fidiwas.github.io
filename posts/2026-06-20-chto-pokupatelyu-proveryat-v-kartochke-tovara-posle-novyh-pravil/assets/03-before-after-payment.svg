<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.5" stop-color="#172554"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="72" y="74" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#7dd3fc">The Signal / Сигнал</text>
  <text x="600" y="140" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="850" fill="#ffffff">До оплаты дешевле проверить</text>
  <text x="600" y="180" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#cbd5e1">После оплаты спор обычно идет дольше и требует доказательств.</text>

  <g filter="url(#shadow)" font-family="Arial, Helvetica, sans-serif">
    <rect x="74" y="232" width="492" height="322" rx="34" fill="#f8fafc"/>
    <rect x="225" y="262" width="190" height="42" rx="18" fill="#dcfce7"/>
    <text x="320" y="290" text-anchor="middle" font-size="23" font-weight="850" fill="#166534">До оплаты</text>
    <text x="320" y="350" text-anchor="middle" font-size="26" font-weight="850" fill="#0f172a">Можно остановиться</text>
    <g font-size="21" font-weight="800" fill="#334155" text-anchor="middle">
      <text x="320" y="404">проверить продавца</text>
      <text x="320" y="444">сохранить условия</text>
      <text x="320" y="484">сверить итоговую сумму</text>
    </g>
    <rect x="205" y="496" width="230" height="40" rx="17" fill="#22c55e"/>
    <text x="320" y="522" text-anchor="middle" font-size="18" font-weight="850" fill="#052e16">решение еще ваше</text>

    <rect x="634" y="232" width="492" height="322" rx="34" fill="#fff7ed"/>
    <rect x="777" y="262" width="206" height="42" rx="18" fill="#fed7aa"/>
    <text x="880" y="290" text-anchor="middle" font-size="23" font-weight="850" fill="#9a3412">После оплаты</text>
    <text x="880" y="350" text-anchor="middle" font-size="26" font-weight="850" fill="#0f172a">Начинается переписка</text>
    <g font-size="21" font-weight="800" fill="#334155" text-anchor="middle">
      <text x="880" y="404">кто отвечает?</text>
      <text x="880" y="444">условия были?</text>
      <text x="880" y="484">чек и скрин есть?</text>
    </g>
    <rect x="765" y="496" width="230" height="40" rx="17" fill="#fb923c"/>
    <text x="880" y="522" text-anchor="middle" font-size="18" font-weight="850" fill="#431407">теперь нужен след</text>
  </g>

  <path d="M566 393 H634" stroke="#fbbf24" stroke-width="10" stroke-linecap="round"/>
  <path d="M622 375 L646 393 L622 411" fill="none" stroke="#fbbf24" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="600" y="610" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="850" fill="#ffffff">Главный момент проверки — последний экран перед кнопкой “оплатить”.</text>
</svg>
