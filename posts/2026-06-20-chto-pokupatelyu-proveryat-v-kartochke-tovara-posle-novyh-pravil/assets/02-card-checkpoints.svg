<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.58" stop-color="#eef7ff"/>
      <stop offset="1" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="64" y="48" width="1072" height="592" rx="34" fill="#ffffff" opacity="0.72"/>
  <text x="84" y="106" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#0e7490">The Signal / Сигнал</text>
  <text x="600" y="158" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="850" fill="#111827">Карточка товара: что смотреть</text>
  <text x="600" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#475569">Спорят потом не с красивой фотографией, а с условиями в карточке.</text>

  <g filter="url(#shadow)" font-family="Arial, Helvetica, sans-serif">
    <rect x="118" y="244" width="382" height="302" rx="30" fill="#ffffff"/>
    <rect x="150" y="280" width="318" height="150" rx="22" fill="#dbeafe"/>
    <path d="M178 398 L244 330 L296 380 L336 342 L442 430 H178 Z" fill="#93c5fd"/>
    <circle cx="400" cy="318" r="22" fill="#fbbf24"/>
    <text x="309" y="474" text-anchor="middle" font-size="24" font-weight="850" fill="#0f172a">Товар выглядит нормально</text>
    <text x="309" y="508" text-anchor="middle" font-size="18" fill="#64748b">но этого мало для решения</text>

    <g font-size="22" font-weight="850">
      <rect x="560" y="242" width="220" height="116" rx="24" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/>
      <text x="670" y="294" text-anchor="middle" fill="#0e7490">Продавец</text>
      <text x="670" y="326" text-anchor="middle" font-size="17" font-weight="700" fill="#475569">кто отвечает</text>

      <rect x="832" y="242" width="220" height="116" rx="24" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
      <text x="942" y="294" text-anchor="middle" fill="#166534">Документы</text>
      <text x="942" y="326" text-anchor="middle" font-size="17" font-weight="700" fill="#475569">если они нужны</text>

      <rect x="560" y="402" width="220" height="116" rx="24" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
      <text x="670" y="454" text-anchor="middle" fill="#9a3412">Возврат</text>
      <text x="670" y="486" text-anchor="middle" font-size="17" font-weight="700" fill="#475569">сроки и условия</text>

      <rect x="832" y="402" width="220" height="116" rx="24" fill="#fefce8" stroke="#fde68a" stroke-width="2"/>
      <text x="942" y="454" text-anchor="middle" fill="#854d0e">Итоговая цена</text>
      <text x="942" y="486" text-anchor="middle" font-size="17" font-weight="700" fill="#475569">что реально спишут</text>
    </g>
  </g>

  <rect x="122" y="568" width="956" height="50" rx="18" fill="#111827"/>
  <text x="600" y="600" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="850" fill="#ffffff">Хорошая карточка отвечает на вопрос: что именно я покупаю?</text>
</svg>
