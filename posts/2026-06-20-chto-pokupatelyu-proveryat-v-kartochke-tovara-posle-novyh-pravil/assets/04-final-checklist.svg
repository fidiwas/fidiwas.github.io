<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="0.55" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="76" y="76" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#0e7490">The Signal / Сигнал</text>
  <text x="600" y="142" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="850" fill="#111827">4 вопроса перед покупкой</text>
  <text x="600" y="184" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#475569">Если на один ответ “не знаю” — вы покупаете не только товар, но и риск.</text>

  <g filter="url(#shadow)" font-family="Arial, Helvetica, sans-serif">
    <rect x="86" y="242" width="244" height="224" rx="28" fill="#ffffff"/>
    <circle cx="208" cy="294" r="28" fill="#ccfbf1"/>
    <text x="208" y="303" text-anchor="middle" font-size="28" font-weight="850" fill="#0f766e">1</text>
    <text x="208" y="352" text-anchor="middle" font-size="28" font-weight="850" fill="#111827">Продавец</text>
    <text x="208" y="388" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">понятно,</text>
    <text x="208" y="416" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">к кому идти</text>
    <text x="208" y="444" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">с проблемой?</text>

    <rect x="358" y="242" width="244" height="224" rx="28" fill="#eff6ff"/>
    <circle cx="480" cy="294" r="28" fill="#bfdbfe"/>
    <text x="480" y="303" text-anchor="middle" font-size="28" font-weight="850" fill="#1d4ed8">2</text>
    <text x="480" y="352" text-anchor="middle" font-size="28" font-weight="850" fill="#111827">Описание</text>
    <text x="480" y="388" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">модель, состав,</text>
    <text x="480" y="416" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">комплект и</text>
    <text x="480" y="444" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">документы есть?</text>

    <rect x="630" y="242" width="244" height="224" rx="28" fill="#fff7ed"/>
    <circle cx="752" cy="294" r="28" fill="#fed7aa"/>
    <text x="752" y="303" text-anchor="middle" font-size="28" font-weight="850" fill="#9a3412">3</text>
    <text x="752" y="352" text-anchor="middle" font-size="28" font-weight="850" fill="#111827">Возврат</text>
    <text x="752" y="388" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">срок и порядок</text>
    <text x="752" y="416" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">возврата</text>
    <text x="752" y="444" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">понятны?</text>

    <rect x="902" y="242" width="244" height="224" rx="28" fill="#f0fdf4"/>
    <circle cx="1024" cy="294" r="28" fill="#bbf7d0"/>
    <text x="1024" y="303" text-anchor="middle" font-size="28" font-weight="850" fill="#166534">4</text>
    <text x="1024" y="352" text-anchor="middle" font-size="28" font-weight="850" fill="#111827">Цена</text>
    <text x="1024" y="388" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">доставка, скидка,</text>
    <text x="1024" y="416" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">бонусы и способ</text>
    <text x="1024" y="444" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">оплаты сходятся?</text>
  </g>

  <rect x="234" y="534" width="732" height="58" rx="20" fill="#111827"/>
  <text x="600" y="571" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="850" fill="#ffffff">Дешевле проверить сейчас, чем доказывать потом.</text>
</svg>
