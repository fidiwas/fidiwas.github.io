<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.54" stop-color="#13233a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="pay" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <path d="M0 560 C190 500 330 520 490 604 C650 688 900 676 1200 606 L1200 675 L0 675 Z" fill="#0f766e" opacity="0.22"/>
  <path d="M0 0 H1200 V675 H0 Z" fill="none" stroke="#203247" stroke-width="2"/>
  <g opacity="0.14" stroke="#dbeafe" stroke-width="1">
    <path d="M72 128 H520"/>
    <path d="M72 188 H520"/>
    <path d="M72 248 H520"/>
    <path d="M72 308 H520"/>
    <path d="M72 368 H520"/>
  </g>

  <text x="76" y="78" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="#7dd3fc">The Signal / Сигнал</text>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="364" y="172" font-size="68" font-weight="850" fill="#ffffff">Перед оплатой</text>
    <text x="364" y="252" font-size="68" font-weight="850" fill="#ffffff">проверьте</text>
    <text x="364" y="332" font-size="68" font-weight="850" fill="#ffffff">4 вещи</text>
    <rect x="301" y="384" width="126" height="8" rx="4" fill="#22c55e"/>
    <text x="364" y="446" font-size="30" font-weight="700" fill="#cbd5e1">продавец • описание • возврат • итог</text>
    <text x="364" y="492" font-size="24" fill="#94a3b8">До кнопки “оплатить” спор еще можно предотвратить.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="690" y="78" width="392" height="520" rx="36" fill="url(#panel)"/>
    <rect x="728" y="122" width="190" height="28" rx="14" fill="#dbeafe"/>
    <rect x="936" y="122" width="86" height="28" rx="14" fill="#e2e8f0"/>
    <rect x="728" y="182" width="312" height="86" rx="22" fill="#ffffff" stroke="#d8e3f1" stroke-width="2"/>
    <text x="884" y="219" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#111827">Карточка товара</text>
    <text x="884" y="247" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#64748b">не только фото и цена</text>

    <g font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">
      <rect x="728" y="296" width="312" height="46" rx="16" fill="#f0fdfa" stroke="#99f6e4"/>
      <text x="884" y="326" text-anchor="middle" fill="#115e59">1. Кто продает?</text>
      <rect x="728" y="356" width="312" height="46" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="884" y="386" text-anchor="middle" fill="#1d4ed8">2. Что обещано?</text>
      <rect x="728" y="416" width="312" height="46" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="884" y="446" text-anchor="middle" fill="#9a3412">3. Как вернуть?</text>
      <rect x="728" y="476" width="312" height="46" rx="16" fill="#f0fdf4" stroke="#bbf7d0"/>
      <text x="884" y="506" text-anchor="middle" fill="#166534">4. Сколько спишут?</text>
    </g>

    <rect x="740" y="536" width="288" height="42" rx="17" fill="url(#pay)"/>
    <text x="884" y="563" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="850" fill="#052e16">Проверить, потом платить</text>
  </g>
</svg>
