<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.58" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="74" y="78" font-size="22" font-weight="700" fill="#7dd3fc">The Signal / Сигнал</text>
    <text x="74" y="175" font-size="59" font-weight="850" fill="#ffffff">Скидка</text>
    <text x="74" y="242" font-size="59" font-weight="850" fill="#ffffff">не так проста</text>
    <text x="76" y="322" font-size="39" font-weight="850" fill="#fde68a">5 признаков,</text>
    <text x="76" y="372" font-size="39" font-weight="850" fill="#fde68a">что цену надо проверить</text>
    <text x="78" y="482" font-size="27" fill="#d1d5db">Смотрите не на процент,</text>
    <text x="78" y="522" font-size="27" fill="#d1d5db">а на финальную сумму перед оплатой.</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="720" y="112" width="398" height="430" rx="22" fill="#f8fafc"/>
    <text x="919" y="164" text-anchor="middle" font-size="27" font-weight="850" fill="#0f172a">Быстрая проверка</text>
    <g>
      <rect x="765" y="202" width="308" height="48" rx="12" fill="#dbeafe"/>
      <text x="919" y="234" text-anchor="middle" font-size="20" font-weight="850" fill="#1e3a8a">способ оплаты</text>
    </g>
    <g>
      <rect x="765" y="270" width="308" height="48" rx="12" fill="#fef3c7"/>
      <text x="919" y="302" text-anchor="middle" font-size="20" font-weight="850" fill="#854d0e">цена в корзине</text>
    </g>
    <g>
      <rect x="765" y="338" width="308" height="48" rx="12" fill="#dcfce7"/>
      <text x="919" y="370" text-anchor="middle" font-size="20" font-weight="850" fill="#166534">доставка и сборы</text>
    </g>
    <g>
      <rect x="765" y="406" width="308" height="48" rx="12" fill="#fee2e2"/>
      <text x="919" y="438" text-anchor="middle" font-size="20" font-weight="850" fill="#991b1b">старая цена</text>
    </g>
    <g>
      <rect x="765" y="474" width="308" height="48" rx="12" fill="#ede9fe"/>
      <text x="919" y="506" text-anchor="middle" font-size="20" font-weight="850" fill="#5b21b6">итог перед оплатой</text>
    </g>
  </g>
  <rect x="0" y="590" width="1200" height="85" fill="#0f172a" opacity="0.82"/>
  <text x="600" y="643" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="850" fill="#ffffff">Хорошая скидка не боится проверки</text>
</svg>
